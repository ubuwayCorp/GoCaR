<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ROVER 400 POLIZEI · Dynamic Weather</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
  body { overflow: hidden; background: #0a0a0f; font-family: 'Segoe UI', system-ui, sans-serif; touch-action: none; }
  canvas { display: block; width: 100vw; height: 100vh; }
  
  #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
  
  #speedo {
    position: fixed; top: 20px; right: 20px;
    background: rgba(0,0,0,0.78); backdrop-filter: blur(12px);

  #speedo span { font-size: 14px; color: #777; margin-left: 8px; font-weight: 400; }

  .damage-bar-fill { height: 100%; width: 0%; border-radius: 7px; transition: width 0.15s ease; }

  #mission-panel {
    position: fixed; top: 100px; left: 50%; transform: translateX(-50%);

  @keyframes missionPulse { 0%, 100% { box-shadow: 0 0 60px rgba(255,30,30,0.5); } 50% { box-shadow: 0 0 80px rgba(255,30,30,0.8); } }
  .mission-title { font-size: 13px; color: #ff3333; text-transform: uppercase; font-weight: 800; margin-bottom: 8px; }

  @keyframes banditFlash { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; } }
  
  #controls { position: fixed; bottom: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 30; }
  #steer-zone { position: absolute; bottom: 35px; left: 35px; display: flex; gap: 14px; pointer-events: auto; }

    width: 72px; height: 72px; border-radius: 50%;

  .pedal.active { background: rgba(255,255,255,0.2); border-color: #fff; }

  .pedal.brake { height: 80px; }
  .pedal.brake.active { background: rgba(255,50,50,0.25); border-color: #ff3333; }
  
  #siren-btn {
    position: fixed; top: 20px; right: 180px;
    width: 52px; height: 52px; border-radius: 50%;
    background: rgba(0,60,180,0.7); border: 2px solid rgba(0,150,255,0.5);
    backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center;
    font-size: 26px; cursor: pointer; pointer-events: auto; z-index: 25;
  }
  #siren-btn.active { background: rgba(0,100,255,0.9); border-color: #00ccff; box-shadow: 0 0 30px rgba(0,150,255,0.6); animation: sirenPulse 0.25s ease-in-out infinite alternate; }
  @keyframes sirenPulse { from { box-shadow: 0 0 25px rgba(0,150,255,0.5); } to { box-shadow: 0 0 45px rgba(0,200,255,0.8); } }
  
  #crash-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at center, rgba(255,60,0,0.5) 0%, transparent 70%); pointer-events: none; opacity: 0; z-index: 15; }
  #crash-flash.active { opacity: 1; }
  
  #explosion-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #ff6600 0%, #ff2200 30%, #880000 60%, #000 100%); pointer-events: none; opacity: 0; z-index: 100; }
  #explosion-screen.active { animation: explosionAnim 2s ease-out forwards; }
  @keyframes explosionAnim { 0% { opacity: 1; } 50% { opacity: 1; } 100% { opacity: 0; } }
  
  #gameover {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.92); z-index: 200;
    display: none; align-items: center; justify-content: center; flex-direction: column;
  }
  #gameover.active { display: flex; }
  #gameover h1 { font-size: 56px; color: #ff2222; text-transform: uppercase; text-shadow: 0 0 30px rgba(255,0,0,0.8); margin-bottom: 20px; }
  #gameover p { font-size: 18px; color: #888; margin-bottom: 30px; }
  #restart-btn { padding: 18px 50px; font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #ff4444, #cc0000); color: #fff; border: none; border-radius: 12px; cursor: pointer; pointer-events: auto; }
  
  #engine-smoke {
    position: fixed; top: 20px; left: 230px;
    background: rgba(0,0,0,0.7); padding: 6px 14px;
    border-radius: 10px; font-size: 12px; color: #ff6600;

  }
  #engine-smoke.active { display: block; animation: smokePulse 0.5s ease-in-out infinite; }
  @keyframes smokePulse { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
  
  #bandit-counter {
    position: fixed; top: 20px; right: 280px;
    background: rgba(0,0,0,0.7); padding: 8px 16px;
    border-radius: 12px; font-size: 13px; color: #ff4444;

  }
  #bandit-counter.active { display: block; }
  
  @media (max-width: 768px) {
    #speedo { top: 12px; right: 12px; font-size: 34px; padding: 10px 18px; }
    #damage-panel { top: 12px; left: 12px; padding: 8px 14px; min-width: 150px; }
    #mission-panel { top: 70px; padding: 12px 20px; min-width: 250px; }
    #siren-btn { top: 12px; right: 140px; width: 44px; height: 44px; font-size: 20px; }
    #engine-smoke { top: 12px; left: 160px; font-size: 10px; }
    #bandit-counter { top: 12px; right: 190px; font-size: 11px; }
    #steer-zone { bottom: 25px; left: 25px; }
    .steer-btn { width: 64px; height: 64px; font-size: 22px; }
    #pedals-zone { bottom: 25px; right: 25px; }
    .pedal { width: 64px; }
    .pedal.gas { height: 92px; }
    .pedal.brake { height: 70px; }
  }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }

<script type="module">
import * as THREE from 'three';

// ==================== КОНФИГУРАЦИЯ ====================
const CFG = {
  roadWidth: 32,
  chunkLength: 120,
  spawnAhead: 7,
  despawnBehind: 5,
  mass: 1800,
  maxSpeedReal: 58.0,
  accelerationReal: 7.0,
  brakeDeceleration: 16.0,
  reverseSpeed: -12.0,
  steerSpeed: 0.85,
  steerMax: 0.52,
  maxSteerAngle: 0.58,
  lateralGrip: 0.999,
  longitudinalGrip: 0.999,
  gripLossSpeed: 70.0,
  cameraDistance: 7.0,
  cameraHeight: 2.4,
  cameraFollowLerp: 0.20,
  cameraLookAhead: 8.0,
  crashForceThreshold: 0.15,
  crashForceMax: 5.0,
  hoodDetachForce: 0.28,
  bumperDetachForce: 0.22,
  bodyDentForce: 0.22,
  doorDamageThreshold: 0.35,
  dentDepth: 0.055,
  dentRadius: 0.45,
  scratchThreshold: 0.08,
  debrisLifetime: 7000,
  debrisMaxCount: 40,
  particleMaxCount: 150,
  maxScratches: 50,
  roadLeft: -15,
  roadRight: 15,
  laneWidth: 5.0,
  numLanes: 6,
  trafficSpawnChance: 0.28,
  initialTrafficCount: 22,
  trafficReactionDist: 45,
  trafficLightDist: 130,
  trafficLightCycle: 16,
  banditSpawnInterval: 18,
  banditBaseSpeed: 40,
  banditSpeedIncrease: 5,
  banditEvasionChance: 0.3,
  maxBanditLevel: 5,
  fogColor: 0x9BB8CC,
  fogNear: 80,
  fogFar: 200
};

// ==================== ПОГОДА (БЕЗ НОЧИ И ИНДИКАТОРА) ====================
let currentWeather = 'sunny';
let weatherTransition = 0;
let nextWeather = null;

const weathers = {
  sunny: { name: 'sunny', fogColor: 0x9BB8CC, fogDensity: 0.008, sunIntensity: 1.5, ambientIntensity: 0.65, roadRoughness: 0.85, skyTop: 0x7BA8C8, skyBottom: 0xD8E8F0 },
  rain: { name: 'rain', fogColor: 0x6688AA, fogDensity: 0.02, sunIntensity: 0.7, ambientIntensity: 0.45, roadRoughness: 0.4, skyTop: 0x557799, skyBottom: 0x88AACC },
  fog: { name: 'fog', fogColor: 0xAAAAAA, fogDensity: 0.04, sunIntensity: 0.5, ambientIntensity: 0.55, roadRoughness: 0.7, skyTop: 0xBBBBBB, skyBottom: 0xDDDDDD }
};

function setWeather(weatherName, scene, sun, ambient, skyMat) {
  if (currentWeather === weatherName) return;
  nextWeather = weatherName;
  weatherTransition = 0;
}

function updateWeather(dt, scene, sun, ambient, skyMat) {
  if (nextWeather) {
    weatherTransition += dt * 0.3;
    if (weatherTransition >= 1) {
      currentWeather = nextWeather;
      nextWeather = null;
      weatherTransition = 0;
    }
    
    const from = weathers[currentWeather];
    const to = weathers[nextWeather];
    const t = Math.min(1, weatherTransition);
    
    if (scene.fog) {
      const r = ((from.fogColor >> 16 & 255) * (1-t) + (to.fogColor >> 16 & 255) * t) / 255;
      const g = ((from.fogColor >> 8 & 255) * (1-t) + (to.fogColor >> 8 & 255) * t) / 255;
      const b = ((from.fogColor & 255) * (1-t) + (to.fogColor & 255) * t) / 255;
      scene.fog.color.setRGB(r, g, b);
      scene.fog.density = from.fogDensity * (1-t) + to.fogDensity * t;
    }
    
    sun.intensity = from.sunIntensity * (1-t) + to.sunIntensity * t;
    ambient.intensity = from.ambientIntensity * (1-t) + to.ambientIntensity * t;
  }
  
  // Рандомная смена погоды каждые 30-60 секунд
  if (Math.random() < 0.0005 && !nextWeather) {
    const weathersList = ['sunny', 'rain', 'fog'];
    const newWeather = weathersList[Math.floor(Math.random() * weathersList.length)];
    if (newWeather !== currentWeather) {
      setWeather(newWeather, scene, sun, ambient, skyMat);
    }
  }
}

// ==================== УТИЛИТЫ ====================
const Utils = {
  clamp: (val, min, max) => Math.max(min, Math.min(max, val)),
  lerp: (a, b, t) => a + (b - a) * t,
  rand: (min, max) => min + Math.random() * (max - min),
  randSign: () => Math.random() > 0.5 ? 1 : -1,
  randInt: (min, max) => Math.floor(Math.random() * (max - min + 1)) + min,
  approach: (current, target, rate, dt) => {
    const diff = target - current;
    const maxChange = rate * dt * 60;
    if (Math.abs(diff) < maxChange) return target;
    return current + Math.sign(diff) * maxChange;
  },
  disposeObject: (obj) => {
    if (!obj) return;
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
      mats.forEach(m => {
        if (m.map) m.map.dispose();
        if (m.dispose) m.dispose();
      });
    }
  }
};

// ==================== ПУЛ ОБЪЕКТОВ ====================
class ObjectPool {
  constructor(createFn, resetFn, initialCount = 15) {
    this.createFn = createFn;
    this.resetFn = resetFn;
    this.pool = [];
    this.active = [];
    for (let i = 0; i < initialCount; i++) this.pool.push(createFn());
  }
  acquire(...args) {
    const obj = this.pool.length > 0 ? this.pool.pop() : this.createFn();
    this.resetFn(obj, ...args);
    this.active.push(obj);
    return obj;
  }
  release(obj) {
    const idx = this.active.indexOf(obj);
    if (idx >= 0) {
      this.active.splice(idx, 1);
      this.pool.push(obj);
    }
  }
  releaseAll() {
    while (this.active.length > 0) this.release(this.active[0]);
  }
  updateAll(dt, updateFn) {
    for (let i = this.active.length - 1; i >= 0; i--) {
      if (!updateFn(this.active[i], dt)) this.release(this.active[i]);
    }
  }
}

// ==================== ЧАСТИЦЫ ====================
class Particle {
  constructor(scene) {
    this.scene = scene;
    this.mesh = null;
    this.alive = false;
    this.lifetime = 0;
    this.maxLife = 1;
    this.vel = new THREE.Vector3();
    this.rot = new THREE.Vector3();
    this.type = 'spark';
  }
  
  init(pos, type) {
    this.alive = true;
    this.lifetime = 0;
    this.type = type;
    
    if (!this.mesh) {
      if (type === 'spark') {
        this.mesh = new THREE.Mesh(
          new THREE.BoxGeometry(0.07, 0.07, 0.07),
          new THREE.MeshBasicMaterial({ color: 0xffdd00 })
        );
      } else if (type === 'fire') {
        this.mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.16, 8, 8),
          new THREE.MeshBasicMaterial({ color: 0xff5500, transparent: true })
        );
      } else if (type === 'smoke') {
        this.mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.22, 6, 6),
          new THREE.MeshBasicMaterial({ color: 0x555555, transparent: true })
        );
      } else if (type === 'engineSmoke') {
        this.mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.25, 8, 8),
          new THREE.MeshBasicMaterial({ color: 0x666666, transparent: true })
        );
      }
      this.scene.add(this.mesh);
    }
    
    this.mesh.visible = true;
    this.mesh.position.copy(pos);
    this.mesh.position.x += Utils.rand(-0.3, 0.3);
    this.mesh.position.y += Utils.rand(0.1, 0.5);
    this.mesh.position.z += Utils.rand(-0.3, 0.3);
    
    if (type === 'engineSmoke') {
      this.vel.set(Utils.rand(-0.4, 0.4), Utils.rand(1.5, 2.5), Utils.rand(-0.4, 0.4));
      this.maxLife = Utils.rand(1.5, 2.5);
      this.mesh.scale.setScalar(Utils.rand(0.25, 0.45));
      this.mesh.material.opacity = 0.5;
    } else {
      const power = type === 'spark' ? 6 : type === 'fire' ? 3.5 : 2;
      this.vel.set(
        Utils.rand(-1, 1) * power,
        Utils.rand(1.5, 3.5) * (type === 'smoke' ? 0.7 : 1),
        Utils.rand(-1, 1) * power
      );
      
      if (type === 'spark') {
        this.maxLife = Utils.rand(0.3, 0.6);
        this.mesh.scale.setScalar(0.08);
      } else if (type === 'fire') {
        this.maxLife = Utils.rand(0.8, 1.5);
        this.mesh.scale.setScalar(Utils.rand(0.16, 0.35));
        this.mesh.material.opacity = 0.9;
      } else {
        this.maxLife = Utils.rand(1.6, 2.8);
        this.mesh.scale.setScalar(Utils.rand(0.25, 0.5));
        this.mesh.material.opacity = 0.4;
      }
    }
    
    this.rot.set(Utils.rand(-10, 10), Utils.rand(-10, 10), Utils.rand(-10, 10));
    return this;
  }
  
  update(dt) {
    if (!this.alive) return false;
    
    this.lifetime += dt;
    if (this.lifetime >= this.maxLife) {
      this.alive = false;
      this.mesh.visible = false;
      return false;
    }
    
    this.mesh.position.add(this.vel.clone().multiplyScalar(dt));
    this.mesh.rotation.x += this.rot.x * dt;
    this.mesh.rotation.y += this.rot.y * dt;
    
    if (this.type === 'engineSmoke') {
      this.vel.y += 0.5 * dt;
      this.vel.multiplyScalar(0.98);
    } else {
      this.vel.y -= (this.type === 'smoke' ? 0.2 : 7) * dt;
      this.vel.multiplyScalar(0.985);
    }
    
    const progress = this.lifetime / this.maxLife;
    
    if (this.type === 'fire') {
      this.mesh.material.opacity = 0.9 * (1 - progress);
      this.mesh.scale.multiplyScalar(1 + dt * 2);
    } else if (this.type === 'smoke' || this.type === 'engineSmoke') {
      this.mesh.material.opacity = 0.5 * (1 - progress * 0.7);
      this.mesh.scale.multiplyScalar(1 + dt * 0.8);
    } else {
      this.mesh.material.opacity = 1 - progress;
      this.mesh.scale.multiplyScalar(1 - dt * 1.5);
    }
    
    return true;
  }
}

// ==================== ЦАРАПИНЫ ====================
class Scratch {
  constructor(scene) {
    this.scene = scene;
    this.scratches = [];
  }
  
  add(position, normal, length = 0.5) {
    if (this.scratches.length >= CFG.maxScratches) {
      const old = this.scratches.shift();
      old.forEach(m => {
        if (m.parent) m.parent.remove(m);
        Utils.disposeObject(m);
      });
    }
    
    const scratchGroup = new THREE.Group();
    const scratchMat = new THREE.MeshStandardMaterial({
      color: 0xe8e8e8,
      metalness: 0.95,
      roughness: 0.15,
      emissive: 0x222222,
      emissiveIntensity: 0.2
    });
    
    const numSegments = Math.floor(length / 0.1) + 1;
    for (let i = 0; i < numSegments; i++) {
      const segLen = Math.min(0.1, length - i * 0.1);
      const scratch = new THREE.Mesh(
        new THREE.BoxGeometry(0.03, 0.008, segLen),
        scratchMat
      );
      
      const offset = (i * 0.1 + segLen/2 - length/2);
      scratch.position.copy(position);
      scratch.position.add(normal.clone().multiplyScalar(0.01));
      scratch.position.add(normal.clone().cross(new THREE.Vector3(0,1,0)).multiplyScalar(offset));
      scratch.lookAt(scratch.position.clone().add(normal));
      scratchGroup.add(scratch);
    }
    
    this.scene.add(scratchGroup);
    this.scratches.push(scratchGroup.children);
    return scratchGroup;
  }
  
  clear() {
    this.scratches.forEach(group => {
      group.forEach(m => {
        if (m.parent) m.parent.remove(m);
        Utils.disposeObject(m);
      });
    });
    this.scratches = [];
  }
}

// ==================== ВЗРЫВ ====================
class Explosion {
  constructor(scene, particlePool) {
    this.scene = scene;
    this.particlePool = particlePool;
  }
  
  trigger(pos, power, isBig = false) {
    const count = isBig ? 80 : Math.floor(Utils.lerp(18, 40, Utils.clamp(power / CFG.crashForceMax, 0, 1)));
    
    document.getElementById('crash-flash').classList.add('active');
    setTimeout(() => document.getElementById('crash-flash').classList.remove('active'), 60);
    
    for (let i = 0; i < count; i++) {
      const r = Math.random();
      const type = r < 0.25 ? 'spark' : r < 0.65 ? 'fire' : 'smoke';
      this.particlePool?.acquire(pos.clone(), type);
    }
    
    if (isBig) {
      document.getElementById('explosion-screen').classList.add('active');
      setTimeout(() => document.getElementById('explosion-screen').classList.remove('active'), 2000);
    }
  }
}

// ==================== ОБЛОМКИ ====================
class Debris {
  constructor(scene) {
    this.scene = scene;
    this.mesh = null;
    this.alive = false;
    this.velocity = new THREE.Vector3();
    this.angularVelocity = new THREE.Vector3();
    this.lifetime = 0;
    this.maxLife = CFG.debrisLifetime / 1000;
  }
  
  init(mesh, pos, quat, velocity, angularVelocity) {
    this.alive = true;
    this.lifetime = 0;
    
    if (!this.mesh) {
      this.mesh = new THREE.Group();
      this.scene.add(this.mesh);
    }
    
    while(this.mesh.children.length) {
      this.mesh.remove(this.mesh.children[0]);
    }
    const clone = mesh.clone();
    if (mesh.geometry) clone.geometry = mesh.geometry.clone();
    if (mesh.material) clone.material = mesh.material.clone();
    this.mesh.add(clone);
    
    this.mesh.position.copy(pos);
    this.mesh.quaternion.copy(quat);
    this.mesh.visible = true;
    
    this.velocity.copy(velocity);
    this.angularVelocity.copy(angularVelocity);
    
    return this;
  }
  
  update(dt) {
    if (!this.alive) return false;
    
    this.lifetime += dt;
    if (this.lifetime >= this.maxLife) {
      this.alive = false;
      this.mesh.visible = false;
      return false;
    }
    
    this.mesh.position.add(this.velocity.clone().multiplyScalar(dt));
    this.mesh.rotation.x += this.angularVelocity.x * dt;
    this.mesh.rotation.y += this.angularVelocity.y * dt;
    this.mesh.rotation.z += this.angularVelocity.z * dt;
    
    this.velocity.y -= 15 * dt;
    
    if (this.mesh.position.y < 0.15) {
      this.mesh.position.y = 0.15;
      if (Math.abs(this.velocity.y) > 0.6) {
        this.velocity.y = -this.velocity.y * 0.2;
        this.velocity.x *= 0.8;
        this.velocity.z *= 0.8;
      } else {
        this.velocity.y = 0;
        this.velocity.x *= 0.88;
        this.velocity.z *= 0.88;
      }
      this.angularVelocity.multiplyScalar(0.92);
    }
    
    this.velocity.multiplyScalar(0.99);
    this.angularVelocity.multiplyScalar(0.97);
    
    return true;
  }
}

// ==================== СТРЕЛКА МИССИИ ====================
class MissionArrow {
  constructor(scene) {
    this.scene = scene;
    this.group = new THREE.Group();
    this.build();
    this.group.visible = false;
    scene.add(this.group);
  }
  
  build() {
    const arrowShape = new THREE.Shape();
    arrowShape.moveTo(0, 1.1);
    arrowShape.lineTo(0.45, 0.35);
    arrowShape.lineTo(0.22, 0.35);
    arrowShape.lineTo(0.22, -0.75);
    arrowShape.lineTo(-0.22, -0.75);
    arrowShape.lineTo(-0.22, 0.35);
    arrowShape.lineTo(-0.45, 0.35);
    arrowShape.closePath();
    const arrowGeo = new THREE.ShapeGeometry(arrowShape);
    const arrowMat = new THREE.MeshBasicMaterial({ color: 0xff0000, side: THREE.DoubleSide, transparent: true, opacity: 0.95 });
    this.arrow = new THREE.Mesh(arrowGeo, arrowMat);
    this.group.add(this.arrow);
    
    const ringGeo = new THREE.RingGeometry(0.7, 0.9, 32);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0xff2222, side: THREE.DoubleSide, transparent: true, opacity: 0.7 });
    this.ring = new THREE.Mesh(ringGeo, ringMat);
    this.ring.position.z = -0.05;
    this.group.add(this.ring);
  }
  
  update(position, camera) {
    this.group.position.copy(position);
    this.group.position.y += 3.0 + Math.sin(performance.now() * 0.008) * 0.12;
    this.group.quaternion.copy(camera.quaternion);
    
    const pulse = 1 + Math.sin(performance.now() * 0.012) * 0.12;
    this.arrow.scale.setScalar(pulse);
    this.ring.scale.setScalar(pulse);
  }
  
  show() { this.group.visible = true; }
  hide() { this.group.visible = false; }
}

  setMissionTarget(arrow, level = 1) {
    this.isMissionTarget = true;
    this.missionArrow = arrow;
    this.banditLevel = level;
  }
  
  updatePosition() {
    this.group.position.set(this.x, 0.02, this.z);
    this.group.rotation.y = this.direction > 0 ? 0 : Math.PI;
  }
  
  getBoundingBox() {
    return new THREE.Box3().setFromObject(this.group).expandByScalar(-0.1);
  }
  
  checkAccidentZones() {
    if (this.isBandit) return false;
    for (const zone of accidentZones) {
      const dist = Math.abs(this.z - zone.z);
      if (dist < CFG.trafficReactionDist) {
        const sameLane = Math.abs(this.x - zone.x) < CFG.laneWidth * 0.8;
        if (sameLane) {
          if (this.direction > 0 && this.z > zone.z) continue;
          if (this.direction < 0 && this.z < zone.z) continue;
          return true;
        }
      }
    }
    return false;
  }
  
  evadePlayer(playerX, playerZ) {
    if (!this.isBandit) return;
    
    const distToPlayer = Math.abs(this.z - playerZ);
    if (distToPlayer < 60 && distToPlayer > 10) {
      this.evasionTimer += 0.016;
      
      if (this.evasionTimer > 1.5 && Math.random() < CFG.banditEvasionChance + this.banditLevel * 0.05) {
        const lanes = [1, 2, 3, 4, 5, 6];
        const currentLaneIdx = lanes.findIndex(l => Math.abs(this.getLaneX(l) - this.x) < 0.5);
        
        if (currentLaneIdx >= 0) {
          const newLaneIdx = currentLaneIdx + (Math.random() < 0.5 ? -1 : 1);
          if (newLaneIdx >= 0 && newLaneIdx < 6) {
            this.targetLane = this.getLaneX(lanes[newLaneIdx]);
          }
        }
        this.evasionTimer = 0;
        
        document.getElementById('bandit-warning').style.display = 'block';
        setTimeout(() => {
          document.getElementById('bandit-warning').style.display = 'none';
        }, 1500);
      }
    }
    
    this.x = Utils.lerp(this.x, this.targetLane, 0.08);
    
    if (distToPlayer < 40) {
      this.targetSpeed = this.speed * 1.15;
    }
  }
  
  getLaneX(laneIndex) {
    const laneOffset = laneIndex - 3.5;
    return laneOffset * CFG.laneWidth;
  }
  
  update(dt, playerZ, playerX) {
    if (this.isStopped) {
      this.speed = Utils.approach(this.speed, 0, 10, dt);
      this.updatePosition();
      if (this.missionArrow) this.missionArrow.hide();
      return this.z > playerZ + 350 || this.z < playerZ - 300;
    }
    
    this.evadePlayer(playerX, playerZ);
    
    if (!this.isBandit && this.checkAccidentZones()) {
      this.isStopped = true;
    }
    
    if (this.trafficLights && this.direction > 0 && !this.isBandit) {
      for (const light of this.trafficLights) {
        if (light.state === 'red') {
          const dist = this.z - light.z;
          if (dist > 0 && dist < 35 && this.speed > 0) {
            this.speed = Math.max(0, this.speed - 9 * dt);
          }
        }
      }
    }
    
    this.speed = Utils.approach(this.speed, this.targetSpeed, 3, dt);
    this.z += this.speed * dt;
    this.updatePosition();
    
    if (this.isMissionTarget && this.missionArrow) {
      this.missionArrow.show();
      this.missionArrow.update(this.group.position, camera);
    }
    
    return this.z > playerZ + 350 || this.z < playerZ - 300;
  }
  
  dispose() {
    if (this.missionArrow) this.missionArrow.hide();
    this.group.traverse(obj => { if (obj.geometry) obj.geometry.dispose(); });
    this.scene.remove(this.group);
  }
}

    this.lights = {
      red: new THREE.Mesh(lightGeo, new THREE.MeshStandardMaterial({ color: 0xff0000 })),
      yellow: new THREE.Mesh(lightGeo, new THREE.MeshStandardMaterial({ color: 0xffaa00 })),
      green: new THREE.Mesh(lightGeo, new THREE.MeshStandardMaterial({ color: 0x00ff00 }))
    };
    this.lights.red.position.set(0, 5.0, 0.15);
    this.lights.yellow.position.set(0, 4.6, 0.15);
    this.lights.green.position.set(0, 4.2, 0.15);
    this.group.add(this.lights.red, this.lights.yellow, this.lights.green);
    this.setState('green');
  }
  
  setState(state) {
    this.state = state;
    this.lights.red.material.emissiveIntensity = state === 'red' ? 4.0 : 0.3;
    this.lights.yellow.material.emissiveIntensity = state === 'yellow' ? 4.0 : 0.3;
    this.lights.green.material.emissiveIntensity = state === 'green' ? 4.0 : 0.3;
  }
  
  update(dt) {
    this.timer += dt;
    if (this.timer >= CFG.trafficLightCycle) {
      this.timer = 0;
      if (this.state === 'green') this.setState('yellow');
      else if (this.state === 'yellow') this.setState('red');
      else this.setState('green');
    }
  }
}

// ==================== ROVER 400 POLIZEI ====================
class Rover_400 {
  constructor(scene, scratchSystem) {
    this.scene = scene;
    this.scratchSystem = scratchSystem;
    this.group = new THREE.Group();
    this.wheels = [];
    this.parts = [];
    this.speed = 0;
    this.x = 0;
    this.z = 0;
    this.angle = 0;
    this.steer = 0;
    this.throttleInput = 0;
    this.brakeInput = 0;
    this.lastImpact = 0;
    this.debrisPool = new ObjectPool(() => new Debris(scene), (o,...a) => o.init(...a), 25);
    this.explosion = new Explosion(scene, null);
    this.build();
    scene.add(this.group);
  }
  
  addPart(mesh, name, threshold, isWheel = false) {
    const part = {
      mesh, name, threshold, attached: true, isWheel,
      originalPos: mesh.position.clone(),
      originalQuat: mesh.quaternion.clone()
    };
    this.parts.push(part);
    if (name === 'hood') this.hoodPart = part;
    if (name === 'bumper_f') this.frontBumperPart = part;
    if (name === 'bumper_r') this.rearBumperPart = part;
    if (name === 'body') this.bodyMesh = mesh;
    return part;
  }
  
  addDent(mesh, localImpact, force) {
    if (!mesh?.geometry?.attributes?.position) return;
    const posAttr = mesh.geometry.attributes.position;
    const dentRadius = CFG.dentRadius + force * 0.15;
    const dentDepth = CFG.dentDepth + force * 0.03;
    
    for (let i = 0; i < posAttr.count; i++) {
      const vx = posAttr.getX(i), vy = posAttr.getY(i), vz = posAttr.getZ(i);
      const dist = Math.sqrt((vx-localImpact.x)**2 + (vy-localImpact.y)**2 + (vz-localImpact.z)**2);
      if (dist < dentRadius) {
        const factor = 1 - dist / dentRadius;
        const push = factor * dentDepth;
        posAttr.setXYZ(i,
          vx - ((vx-localImpact.x)/(dist||1))*push,
          vy - ((vy-localImpact.y)/(dist||1))*push,
          vz - ((vz-localImpact.z)/(dist||1))*push
        );
      }
    }
    posAttr.needsUpdate = true;
    mesh.geometry.computeVertexNormals();
  }
  
  detachPart(part, force, impactDir, impactPoint) {
    if (!part.attached) return;
    part.attached = false;
    
    const worldPos = new THREE.Vector3(), worldQuat = new THREE.Quaternion();
    part.mesh.getWorldPosition(worldPos);
    part.mesh.getWorldQuaternion(worldQuat);
    
    const speedFactor = Math.min(1, Math.abs(this.speed) / CFG.maxSpeedReal);
    const vel = new THREE.Vector3(
      impactDir.x * force * 10 + Math.sin(this.angle) * this.speed * 0.8,
      force * 7 + Utils.rand(1.5, 4),
      impactDir.z * force * 10 + Math.cos(this.angle) * this.speed * 0.8
    ).multiplyScalar(0.7 + speedFactor * 0.3);
    
    const angVel = new THREE.Vector3(
      Utils.randSign()*Utils.rand(10, 22),
      Utils.randSign()*Utils.rand(10, 22),
      Utils.randSign()*Utils.rand(10, 22)
    );
    
    if (this.debrisPool.active.length < CFG.debrisMaxCount) {
      this.debrisPool.acquire(part.mesh, worldPos, worldQuat, vel, angVel);
    }
    part.mesh.visible = false;
  }
  
  applyCrash(force, impactDir, impactPoint, isScraping = false) {
    if (isScraping && force >= CFG.scratchThreshold) {
      const now = performance.now();
      if (now - lastSparkTime > 40) {
        lastSparkTime = now;
        const normal = impactDir.clone().negate();
        this.scratchSystem.add(impactPoint, normal, 0.4 + force * 0.3);
        particlePool?.acquire(impactPoint.clone(), 'spark');
        particlePool?.acquire(impactPoint.clone(), 'spark');
      }
      return;
    }
    
    if (force < CFG.crashForceThreshold) return;
    
    const now = performance.now() / 1000;
    if (now - this.lastImpact < 0.1) return;
    this.lastImpact = now;
    
    const carForward = new THREE.Vector3(Math.sin(this.angle), 0, Math.cos(this.angle));
    const impactDot = impactDir.dot(carForward);
    
    // ОТРЫВ ДЕТАЛЕЙ (без проверки скорости!)
    if (this.bodyMesh && force >= CFG.bodyDentForce) {
      const localImpact = impactPoint.clone();
      this.bodyMesh.worldToLocal(localImpact);
      this.addDent(this.bodyMesh, localImpact, force * 0.6);
      addDamage(force * 3);
    }
    
    if (impactDot > 0.25 && this.hoodPart?.attached && force >= CFG.hoodDetachForce) {
      this.detachPart(this.hoodPart, force, impactDir, impactPoint);
      addDamage(force * 5);
    }
    
    if (impactDot > 0.4 && this.frontBumperPart?.attached && force >= CFG.bumperDetachForce) {
      this.detachPart(this.frontBumperPart, force, impactDir, impactPoint);
      addDamage(force * 4);
    }
    
    if (impactDot < -0.4 && this.rearBumperPart?.attached && force >= CFG.bumperDetachForce) {
      this.detachPart(this.rearBumperPart, force, impactDir, impactPoint);
      addDamage(force * 4);
    }
    
    if (Math.abs(impactDot) < 0.3 && force >= CFG.doorDamageThreshold) {
      const doorSide = impactDir.x > 0 ? 'door_0' : 'door_1';
      const doorPart = this.parts.find(p => p.name === doorSide);
      if (doorPart?.attached) {
        this.detachPart(doorPart, force, impactDir, impactPoint);
        addDamage(force * 4);
      }
    }
    
    addDamage(force * 2);
    
    if (force > 0.6) {
      this.explosion.trigger(impactPoint.clone(), force * 0.8);
    }
    
    cameraShake = Utils.clamp(force * 0.6, 0, 1);
    
    if (force > 0.85 && totalDamage > 60) {
      slowMo = 0.28;
      slowMoTimer = 0.45;
    }
    
    if (navigator.vibrate) navigator.vibrate([25, 15, 25]);
  }
  
  build() {
    const g = this.group;
    
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xc0c0c0, metalness: 0.98, roughness: 0.12, clearcoat: 1.0, clearcoatRoughness: 0.04 });
    
    const body = new THREE.Mesh(new THREE.BoxGeometry(1.92, 0.52, 4.75), bodyMat);
    body.position.y = 0.46;
    body.castShadow = true;
    g.add(body);
    this.addPart(body, 'body', 0.46);
    
    const bodyTop = new THREE.Mesh(new THREE.BoxGeometry(1.82, 0.14, 4.55), bodyMat);
    bodyTop.position.y = 0.71;
    bodyTop.castShadow = true;
    g.add(bodyTop);
    
    const hoodGroup = new THREE.Group();
    const hood = new THREE.Mesh(new THREE.BoxGeometry(1.77, 0.07, 1.48), bodyMat);
    hood.position.y = 0.7;
    hood.castShadow = true;
    hoodGroup.add(hood);
    hoodGroup.position.z = -1.58;
    g.add(hoodGroup);
    this.addPart(hoodGroup, 'hood', 0.26);
    
    const roof = new THREE.Mesh(new THREE.BoxGeometry(1.62, 0.42, 2.05), bodyMat);
    roof.position.set(0, 1.12, 0.08);
    roof.castShadow = true;
    g.add(roof);
    
    this.sirenLight = new THREE.Group();
    const sirenBase = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.07, 0.28), new THREE.MeshStandardMaterial({ color: 0x0a0a0a }));
    sirenBase.position.y = 0.8;
    this.sirenLight.add(sirenBase);
    
    this.sirenDome = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.09, 0.13, 18), new THREE.MeshStandardMaterial({ color: 0x0044ff, emissive: 0x0088ff, emissiveIntensity: 0.5, transparent: true, opacity: 0.92 }));
    this.sirenDome.position.y = 0.9;
    this.sirenLight.add(this.sirenDome);
    this.sirenLight.position.set(-0.72, 0, 1.95);
    g.add(this.sirenLight);
    
    const frontBumper = new THREE.Group();
    const fb = new THREE.Mesh(new THREE.BoxGeometry(1.87, 0.28, 0.18), bodyMat);
    fb.position.y = 0.3;
    frontBumper.add(fb);
    frontBumper.position.z = -2.42;
    g.add(frontBumper);
    this.addPart(frontBumper, 'bumper_f', 0.18);
    
    const rearBumper = new THREE.Group();
    const rb = new THREE.Mesh(new THREE.BoxGeometry(1.87, 0.28, 0.18), bodyMat);
    rb.position.y = 0.3;
    rearBumper.add(rb);
    rearBumper.position.z = 2.42;
    g.add(rearBumper);
    this.addPart(rearBumper, 'bumper_r', 0.2);
    
    [-0.96, 0.96].forEach((side, idx) => {
      const door = new THREE.Mesh(new THREE.BoxGeometry(0.055, 0.42, 1.35), bodyMat);
      door.position.set(side, 0.7, 0);
      door.castShadow = true;
      g.add(door);
      this.addPart(door, `door_${idx}`, 0.28);
    });
    
    const wheelPos = [[-0.89, -1.42], [0.89, -1.42], [-0.89, 1.48], [0.89, 1.48]];
    wheelPos.forEach((pos, idx) => {
      const wg = new THREE.Group();
      const tire = new THREE.Mesh(new THREE.TorusGeometry(0.34, 0.11, 18, 34), new THREE.MeshStandardMaterial({ color: 0x080808, roughness: 0.96 }));
      tire.rotation.y = Math.PI / 2;
      wg.add(tire);

      rim.rotation.z = Math.PI / 2;
      wg.add(rim);
      wg.position.set(pos[0], 0.32, pos[1]);
      g.add(wg);
      this.wheels.push(wg);
      this.addPart(wg, `wheel_${idx}`, 0.36, true);

    const canvas = document.createElement('canvas');
    canvas.width = 512;

    ctx.fillStyle = '#c0c0c0';
    ctx.fillRect(0, 0, 512, 128);
    ctx.font = 'bold 72px Arial';
    ctx.fillStyle = '#000000';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('POLIZEI', 256, 64);
    const tex = new THREE.CanvasTexture(canvas);
    const polMat = new THREE.MeshStandardMaterial({ map: tex, transparent: true });
    [-0.96, 0.96].forEach(x => {
      const p = new THREE.Mesh(new THREE.PlaneGeometry(1.55, 0.42), polMat);
      p.position.set(x, 0.66, 0);
      p.rotation.y = x > 0 ? -Math.PI/2 : Math.PI/2;
      g.add(p);
    });
    
    this.engineSmokePoint = new THREE.Vector3(0, 0.8, -1.8);
  }
  
  update(dt, input) {
    if (gameOver) return;
    
    const dtNorm = Math.min(dt, 0.033);
    let targetThrottle = 0, targetBrake = 0;
    
    if (input.gas && !input.brake) targetThrottle = 1;
    else if (input.brake) {
      if (Math.abs(this.speed) < 0.6) targetThrottle = -1;
      else targetBrake = 1;
    }
    
    this.throttleInput = targetThrottle;
    this.brakeInput = targetBrake;
    
    if (this.throttleInput > 0) {
      this.speed += CFG.accelerationReal * this.throttleInput * dtNorm;
    } else if (this.throttleInput < 0) {
      this.speed += CFG.accelerationReal * 0.48 * this.throttleInput * dtNorm;
    }
    
    if (this.brakeInput > 0) {
      const brakeForce = CFG.brakeDeceleration * this.brakeInput;
      this.speed -= Math.sign(this.speed) * brakeForce * dtNorm;
      if (Math.abs(this.speed) < 0.12) this.speed = 0;
    }
    
    this.speed *= Math.pow(0.9994, dtNorm * 60);
    
    const maxSpeed = this.getMaxSpeedByDamage();
    this.speed = Utils.clamp(this.speed, CFG.reverseSpeed, maxSpeed);
    
    const steerInput = (input.left ? -1 : 0) + (input.right ? 1 : 0);
    
    if (Math.abs(this.speed) > 0.4) {
      const speedFactor = Math.max(0.5, 1.0 - Math.abs(this.speed) / CFG.maxSpeedReal * 0.4);
      const targetSteer = steerInput * CFG.steerMax * speedFactor;
      this.steer = Utils.approach(this.steer, targetSteer, CFG.steerSpeed, dtNorm);
      
      const steerAngle = this.steer * CFG.maxSteerAngle;
      const yawRate = (this.speed * Math.tan(steerAngle)) / 2.8;
      const gripFactor = Math.max(0.85, 1.0 - Math.pow(Math.abs(this.speed) / CFG.gripLossSpeed, 1.2));
      this.angle += yawRate * gripFactor * dtNorm;
    } else {
      this.steer = Utils.approach(this.steer, steerInput * CFG.steerMax * 0.5, CFG.steerSpeed * 2, dtNorm);
    }
    
    const forwardX = Math.sin(this.angle);
    const forwardZ = -Math.cos(this.angle);
    const moveDist = this.speed * dtNorm;
    
    this.x += forwardX * moveDist;
    this.z += forwardZ * moveDist;
    this.x = Utils.clamp(this.x, CFG.roadLeft + 1.3, CFG.roadRight - 1.3);
    
    this.group.position.set(this.x, 0.02, this.z);
    this.group.rotation.y = this.angle;
    
    const wheelRot = this.speed * dtNorm * 17.5;
    this.wheels.forEach((w, i) => {
      w.rotation.x += wheelRot;
      if (i < 2) w.rotation.y = this.steer * 0.65;
    });
    
    if (sirenActive) {
      const intensity = Math.sin(performance.now() * 0.028) > 0 ? 5.5 : 1.8;
      this.sirenDome.material.emissiveIntensity = intensity;
    } else {
      this.sirenDome.material.emissiveIntensity = 0.45;
    }
    
    if (totalDamage >= 60 && !engineSmoking) {
      engineSmoking = true;
      document.getElementById('engine-smoke').classList.add('active');
    }
    if (engineSmoking && Math.random() < 0.3) {
      const smokePos = this.group.localToWorld(this.engineSmokePoint.clone());
      particlePool?.acquire(smokePos, 'engineSmoke');
    }
    
    this.debrisPool.updateAll(dtNorm, (debris, dt) => debris.update(dt));
    return true;
  }
  
  getMaxSpeedByDamage() {
    const damageFactor = 1 - (totalDamage / 100) * 0.65;
    return CFG.maxSpeedReal * damageFactor;
  }
  
  getSpeedKMH() {
    return Math.floor(Math.abs(this.speed) * 3.6);
  }
  
  getBoundingBox() {
    return new THREE.Box3().setFromObject(this.group).expandByScalar(-0.1);
  }
  
  explode() {
    gameOver = true;
    totalDamage = 100;
    updateDamageUI();
    
    const worldPos = new THREE.Vector3();
    this.group.getWorldPosition(worldPos);
    this.explosion.trigger(worldPos, CFG.crashForceMax, true);
    
    slowMo = 0.18;
    slowMoTimer = 1.2;
    cameraShake = 1;
    
    this.parts.forEach(p => {
      if (p.attached && !p.isWheel) {
        p.attached = false;
        const pos = new THREE.Vector3(), quat = new THREE.Quaternion();
        p.mesh.getWorldPosition(pos);
        p.mesh.getWorldQuaternion(quat);
        const vel = new THREE.Vector3(Utils.rand(-8, 8), Utils.rand(8, 16), Utils.rand(-8, 8));
        const angVel = new THREE.Vector3(Utils.rand(-20, 20), Utils.rand(-20, 20), Utils.rand(-20, 20));
        if (this.debrisPool.active.length < CFG.debrisMaxCount) {
          this.debrisPool.acquire(p.mesh, pos, quat, vel, angVel);
        }
        p.mesh.visible = false;
      }
    });
    
    setTimeout(() => {
      document.getElementById('gameover').classList.add('active');
    }, 800);
  }
  
  reset() {
    this.speed = 0;
    this.x = 0;
    this.z = 0;
    this.angle = 0;
    this.steer = 0;
    this.throttleInput = 0;
    this.brakeInput = 0;
    
    this.parts.forEach(p => {
      p.attached = true;
      p.mesh.visible = true;
      p.mesh.position.copy(p.originalPos);
      p.mesh.quaternion.copy(p.originalQuat);
    });
    
    this.debrisPool.releaseAll();
    totalDamage = 0;
    gameOver = false;
    engineSmoking = false;
    banditsCaught = 0;
    currentBanditLevel = 1;
    document.getElementById('engine-smoke').classList.remove('active');
    document.getElementById('bandit-counter').classList.remove('active');
    updateDamageUI();
    document.getElementById('gameover').classList.remove('active');
    document.getElementById('explosion-screen').classList.remove('active');
    this.scratchSystem.clear();
  }
}

const Materials = {

  concrete: new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.85 }),
  brick: new THREE.MeshStandardMaterial({ color: 0x8b4513, roughness: 0.8 }),
  brickRed: new THREE.MeshStandardMaterial({ color: 0xa84433, roughness: 0.8 }),
  glass: new THREE.MeshStandardMaterial({ color: 0x446688, metalness: 0.95, roughness: 0.05, transparent: true, opacity: 0.7 }),
  window: new THREE.MeshStandardMaterial({ color: 0x6688aa, metalness: 0.9, roughness: 0.1, emissive: 0x112244, emissiveIntensity: 0.3 }),
  shopWindow: new THREE.MeshStandardMaterial({ color: 0x88aacc, metalness: 0.95, roughness: 0.05, emissive: 0x446688, emissiveIntensity: 0.6 }),
  roof: new THREE.MeshStandardMaterial({ color: 0x333344, roughness: 0.75 }),

};

class Building {
  constructor(scene, x, z, width, depth, height, type = 'residential') {
    this.scene = scene;
    this.group = new THREE.Group();
    this.x = x;
    this.z = z;
    this.type = type;
    this.build(width, depth, height);
    this.group.position.set(x, 0, z);
    scene.add(this.group);
  }
  
  build(width, depth, height) {
    const g = this.group;
    
    if (this.type === 'skyscraper') {
      const body = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), Materials.glass);
      body.position.y = height / 2;
      body.castShadow = true;
      g.add(body);
      
      const frameMat = new THREE.MeshStandardMaterial({ color: 0x223344, metalness: 0.8 });
      for (let y = 0; y < height; y += 4) {
        const frame = new THREE.Mesh(new THREE.BoxGeometry(width + 0.1, 0.3, depth + 0.1), frameMat);
        frame.position.y = y;
        g.add(frame);
      }
      
      const roof = new THREE.Mesh(new THREE.BoxGeometry(width * 0.6, 3, depth * 0.6), Materials.concrete);
      roof.position.y = height + 1.5;
      g.add(roof);
      
    } else if (this.type === 'shop') {
      const body = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), Materials.brickRed);
      body.position.y = height / 2;
      body.castShadow = true;
      g.add(body);
      
      const shopFront = new THREE.Mesh(new THREE.BoxGeometry(width - 0.8, 2.4, 0.1), Materials.shopWindow);
      shopFront.position.set(0, 1.5, depth/2 + 0.1);
      g.add(shopFront);
      
      const sign = new THREE.Mesh(new THREE.BoxGeometry(width - 0.5, 0.55, 0.08), Materials.sign);
      sign.position.set(0, 3.3, depth/2 + 0.15);
      g.add(sign);
      
      const awning = new THREE.Mesh(new THREE.BoxGeometry(width - 0.5, 0.06, 1.3), new THREE.MeshStandardMaterial({ color: 0xcc3333 }));
      awning.position.set(0, 2.8, depth/2 + 0.65);
      g.add(awning);
      
    } else if (this.type === 'modern') {
      const body = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), Materials.concrete);
      body.position.y = height / 2;
      body.castShadow = true;
      g.add(body);
      
      const glassStrip = new THREE.Mesh(new THREE.BoxGeometry(width * 0.7, height * 0.8, 0.1), Materials.glass);
      glassStrip.position.set(0, height/2, depth/2 + 0.05);
      g.add(glassStrip);
      
      for (let floor = 1; floor < height/3.5; floor++) {
        const balcony = new THREE.Mesh(new THREE.BoxGeometry(width + 0.5, 0.12, 0.8), Materials.concrete);
        balcony.position.set(0, floor * 3.5, depth/2 + 0.4);
        g.add(balcony);
      }
      
    } else if (this.type === 'old') {
      const body = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), Materials.brick);
      body.position.y = height / 2;
      body.castShadow = true;
      g.add(body);
      
      const roof = new THREE.Mesh(new THREE.BoxGeometry(width + 0.4, 0.3, depth + 0.4), Materials.roofRed);
      roof.position.y = height + 0.15;
      g.add(roof);
      
      const floorHeight = 3;
      for (let floor = 0; floor < height/floorHeight - 0.5; floor++) {
        for (let w = 0; w < Math.floor(width/2.2); w++) {
          const wx = -width/2 + 1.3 + w * 2.2;
          const win = new THREE.Mesh(new THREE.BoxGeometry(0.06, 1.3, 0.7), Materials.window);
          win.position.set(wx, floor * floorHeight + 1.7, depth/2 + 0.05);
          g.add(win);
        }
      }
      
    } else if (this.type === 'warehouse') {
      const body = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), new THREE.MeshStandardMaterial({ color: 0x667788, roughness: 0.75 }));
      body.position.y = height / 2;
      body.castShadow = true;
      g.add(body);
      
      const door = new THREE.Mesh(new THREE.BoxGeometry(width * 0.6, height * 0.7, 0.1), new THREE.MeshStandardMaterial({ color: 0x334455 }));
      door.position.set(0, height * 0.35, depth/2 + 0.05);
      g.add(door);
      
    } else {
      const body = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), Materials.brick);
      body.position.y = height / 2;
      body.castShadow = true;
      g.add(body);
      
      const roof = new THREE.Mesh(new THREE.BoxGeometry(width + 0.3, 0.25, depth + 0.3), Materials.roof);
      roof.position.y = height + 0.12;
      g.add(roof);
      
      const floorHeight = 3.2;
      for (let floor = 0; floor < height/floorHeight - 0.3; floor++) {
        for (let w = 0; w < Math.floor(width/2.5); w++) {
          const wx = -width/2 + 1.5 + w * 2.5;
          const win = new THREE.Mesh(new THREE.BoxGeometry(0.06, 1.4, 0.8), Materials.window);
          win.position.set(wx, floor * floorHeight + 1.8, depth/2 + 0.05);
          g.add(win);
        }
      }
    }
  }
  
  dispose() {
    this.group.traverse(Utils.disposeObject);
    this.scene.remove(this.group);
  }
}

// ==================== ГОРОД ====================
class CityWorld {
  constructor(scene) {
    this.scene = scene;
    this.chunks = new Map();
    this.nextZ = 0;
    this.car = null;
    this.trafficCars = [];
    this.trafficLights = [];
    this.buildings = [];
    this.lastLightSpawn = 0;
    this.missionArrow = new MissionArrow(scene);
  }
  
  getLaneX(laneIndex) {
    const laneOffset = laneIndex - 3.5;
    return laneOffset * CFG.laneWidth;
  }
  
  createRoadMarkings(g, z) {
    const divider = new THREE.Mesh(new THREE.PlaneGeometry(0.28, CFG.chunkLength), new THREE.MeshStandardMaterial({ color: 0xffcc00 }));
    divider.rotation.x = -Math.PI / 2;
    divider.position.y = 0.004;
    g.add(divider);
    
    const stripeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const stripeLength = 4, stripeGap = 6;
    
    for (let lane = 1; lane < 6; lane++) {
      if (lane === 3) continue;
      const x = this.getLaneX(lane) + CFG.laneWidth/2;
      for (let sz = -CFG.chunkLength/2; sz < CFG.chunkLength/2; sz += stripeLength + stripeGap) {
        const stripe = new THREE.Mesh(new THREE.PlaneGeometry(0.12, stripeLength), stripeMat);
        stripe.rotation.x = -Math.PI / 2;
        stripe.position.set(x, 0.003, sz);
        g.add(stripe);
      }
    }
    
    const edgeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const edgeLeft = new THREE.Mesh(new THREE.PlaneGeometry(0.18, CFG.chunkLength), edgeMat);
    edgeLeft.rotation.x = -Math.PI / 2;
    edgeLeft.position.set(CFG.roadLeft + 0.1, 0.004, 0);
    g.add(edgeLeft);
    
    const edgeRight = new THREE.Mesh(new THREE.PlaneGeometry(0.18, CFG.chunkLength), edgeMat);
    edgeRight.rotation.x = -Math.PI / 2;
    edgeRight.position.set(CFG.roadRight - 0.1, 0.004, 0);
    g.add(edgeRight);
  }
  
  spawnChunk(z) {
    if (this.chunks.has(z)) return;
    
    const g = new THREE.Group();
    g.position.z = z;
    
    const grass = new THREE.Mesh(new THREE.PlaneGeometry(100, CFG.chunkLength), Materials.grass);
    grass.rotation.x = -Math.PI / 2;
    grass.receiveShadow = true;
    g.add(grass);
    
    const sidewalkMat = new THREE.MeshStandardMaterial({ color: 0x999999, roughness: 0.85 });
    const sidewalkLeft = new THREE.Mesh(new THREE.PlaneGeometry(4, CFG.chunkLength), sidewalkMat);
    sidewalkLeft.rotation.x = -Math.PI / 2;
    sidewalkLeft.position.set(CFG.roadLeft - 2.5, 0.002, 0);
    g.add(sidewalkLeft);
    
    const sidewalkRight = new THREE.Mesh(new THREE.PlaneGeometry(4, CFG.chunkLength), sidewalkMat);
    sidewalkRight.rotation.x = -Math.PI / 2;
    sidewalkRight.position.set(CFG.roadRight + 2.5, 0.002, 0);
    g.add(sidewalkRight);
    
    const curbMat = new THREE.MeshStandardMaterial({ color: 0x666666 });
    const curbLeft = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.15, CFG.chunkLength), curbMat);
    curbLeft.position.set(CFG.roadLeft - 0.35, 0.075, 0);
    g.add(curbLeft);
    
    const curbRight = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.15, CFG.chunkLength), curbMat);
    curbRight.position.set(CFG.roadRight + 0.35, 0.075, 0);
    g.add(curbRight);
    
    const road = new THREE.Mesh(new THREE.PlaneGeometry(CFG.roadWidth, CFG.chunkLength), Materials.asphalt);
    road.rotation.x = -Math.PI / 2;
    road.position.y = 0.001;
    road.receiveShadow = true;
    g.add(road);
    
    this.createRoadMarkings(g, z);
    
    const buildingOffset = CFG.roadRight + 6;
    let cz = -CFG.chunkLength/2 + 8;
    
    const types = ['residential', 'shop', 'modern', 'old', 'warehouse', 'skyscraper'];
    
    while (cz < CFG.chunkLength/2 - 8) {
      const width = 8 + Math.random() * 7;
      const depth = 7 + Math.random() * 6;
      const height = Math.random() < 0.15 ? 25 + Math.random() * 20 : 10 + Math.random() * 15;
      
      const type = types[Utils.randInt(0, 5)];
      
      const b1 = new Building(this.scene, buildingOffset + depth/2, z + cz, width, depth, height, type);
      this.buildings.push(b1);
      
      const b2 = new Building(this.scene, -buildingOffset - depth/2, z + cz, width, depth, height, types[Utils.randInt(0, 5)]);
      this.buildings.push(b2);
      
      cz += depth + 5 + Math.random() * 8;
    }
    
    if (z - this.lastLightSpawn >= CFG.trafficLightDist) {
      const light = new TrafficLight(this.scene, CFG.roadRight + 2, z);
      this.trafficLights.push(light);
      this.lastLightSpawn = z;
    }
    
    this.scene.add(g);
    this.chunks.set(z, g);
  }
  
  init(car) {
    this.car = car;
    
    for (let i = 0; i < CFG.spawnAhead; i++) {
      this.spawnChunk(this.nextZ);
      this.nextZ -= CFG.chunkLength;
    }
    
    const forwardLanes = [4, 5, 6];
    const backwardLanes = [1, 2, 3];
    const types = ['sedan', 'sedan', 'sport', 'minivan', 'truck', 'bus', 'taxi', 'pickup'];
    
    for (let i = 0; i < CFG.initialTrafficCount; i++) {
      const isForward = Math.random() < 0.5;
      const lanes = isForward ? forwardLanes : backwardLanes;
      const laneIdx = lanes[Utils.randInt(0, 2)];
      const laneX = this.getLaneX(laneIdx);
      const dir = isForward ? 1 : -1;
      const type = types[Utils.randInt(0, 7)];
      const startPos = -Utils.rand(30, 250) - i * 20;
      this.trafficCars.push(new TrafficCar(this.scene, laneX, dir, startPos, this.trafficLights, type));
    }
  }
  
  spawnBandit() {
    if (missionActive || gameOver) return;
    
    const forwardLanes = [4, 5, 6];
    const laneIdx = forwardLanes[Utils.randInt(0, 2)];
    const laneX = this.getLaneX(laneIdx);
    const startPos = this.car.z - 150;
    
    missionTarget = new TrafficCar(this.scene, laneX, 1, startPos, this.trafficLights, 'sedan', true);
    missionTarget.setMissionTarget(this.missionArrow, currentBanditLevel);
    this.trafficCars.push(missionTarget);
    
    missionActive = true;
    document.getElementById('mission-panel').classList.add('active');
    document.getElementById('mission-text').textContent = 'Догнать бандита! Сбей или перекрой дорогу!';
    document.getElementById('mission-target').textContent = `Цель: Бандит (уровень ${currentBanditLevel})`;
  }
  
  checkMission() {
    if (!missionActive || !missionTarget) return;
    
    const carBox = this.car.getBoundingBox();
    const targetBox = missionTarget.getBoundingBox();
    
    if (carBox.intersectsBox(targetBox)) {
      missionActive = false;
      document.getElementById('mission-panel').classList.remove('active');
      
      banditsCaught++;
      currentBanditLevel = Math.min(currentBanditLevel + 1, CFG.maxBanditLevel);
      
      document.getElementById('bandit-counter').classList.add('active');
      document.getElementById('bandit-counter').textContent = `🚔 Бандитов поймано: ${banditsCaught}`;
      
      totalDamage = Math.max(0, totalDamage - 20);
      updateDamageUI();
      
      missionTarget.isStopped = true;
      missionTarget = null;
      missionTimer = 0;
    }
  }
  
  update() {
    if (!this.car || gameOver) return;
    
    const cz = this.car.z;
    
    while (this.nextZ > cz - CFG.spawnAhead * CFG.chunkLength) {
      this.spawnChunk(this.nextZ);
      this.nextZ -= CFG.chunkLength;
    }
    
    if (this.trafficCars.length < 28 && Math.random() < CFG.trafficSpawnChance) {
      const forwardLanes = [4, 5, 6];
      const backwardLanes = [1, 2, 3];
      const isForward = Math.random() < 0.5;
      const lanes = isForward ? forwardLanes : backwardLanes;
      const laneIdx = lanes[Utils.randInt(0, 2)];
      const laneX = this.getLaneX(laneIdx);
      const dir = isForward ? 1 : -1;
      const types = ['sedan', 'sedan', 'sport', 'minivan', 'truck', 'bus', 'taxi', 'pickup'];
      const type = types[Utils.randInt(0, 7)];
      const startPos = cz - Utils.rand(180, 320) * dir;
      this.trafficCars.push(new TrafficCar(this.scene, laneX, dir, startPos, this.trafficLights, type));
    }
    
    missionTimer += 0.016;
    if (missionTimer >= CFG.banditSpawnInterval && !missionActive) {
      this.spawnBandit();
    }
    
    this.checkMission();
    
    for (let i = this.trafficCars.length - 1; i >= 0; i--) {
      if (this.trafficCars[i].update(0.016, cz, this.car.x)) {
        if (this.trafficCars[i] === missionTarget) {
          missionActive = false;
          missionTarget = null;
          document.getElementById('mission-panel').classList.remove('active');
        }
        this.trafficCars[i].dispose();
        this.trafficCars.splice(i, 1);
      }
    }
    
    this.trafficLights.forEach(light => light.update(0.016));
    
    for (const [z, chunk] of this.chunks) {
      if (z > cz + CFG.despawnBehind * CFG.chunkLength) {
        chunk.traverse(Utils.disposeObject);
        this.scene.remove(chunk);
        this.chunks.delete(z);
      }
    }
    
    for (let i = this.buildings.length - 1; i >= 0; i--) {
      if (this.buildings[i].z > cz + CFG.despawnBehind * CFG.chunkLength + 50) {
        this.buildings[i].dispose();
        this.buildings.splice(i, 1);
      }
    }
    
    accidentZones = accidentZones.filter(zone => Math.abs(zone.z - cz) < 200);
  }
  
  addAccidentZone(x, z) {
    accidentZones.push({ x, z, time: performance.now() });
  }
}

// ==================== КОЛЛИЗИИ ====================
function resolveCollision(car, other, isPlayer = false) {
  const carBox = car.getBoundingBox();
  const otherBox = other.getBoundingBox();
  
  if (!carBox.intersectsBox(otherBox)) return false;
  
  const overlapX = Math.min(carBox.max.x, otherBox.max.x) - Math.max(carBox.min.x, otherBox.min.x);
  const overlapZ = Math.min(carBox.max.z, otherBox.max.z) - Math.max(carBox.min.z, otherBox.min.z);
  
  if (overlapX < overlapZ) {
    const push = overlapX / 2 + 0.05;
    if (car.x < other.x) {
      car.x -= push;
      other.x += push;
    } else {
      car.x += push;
      other.x -= push;
    }
  } else {
    const push = overlapZ / 2 + 0.05;
    if (car.z < other.z) {
      car.z -= push;
      other.z += push;
    } else {
      car.z += push;
      other.z -= push;
    }
  }
  
  car.group.position.x = car.x;
  car.group.position.z = car.z;
  other.group.position.x = other.x;
  other.group.position.z = other.z;
  
  return true;
}

// ==================== ИНИЦИАЛИЗАЦИЯ ====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(CFG.fogColor, CFG.fogNear, CFG.fogFar);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 600);
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.25;
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const ambient = new THREE.AmbientLight(0xffffff, 0.65);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff5e0, 1.5);
sun.position.set(50, 70, 40);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -80;
sun.shadow.camera.right = 80;
sun.shadow.camera.top = 80;
sun.shadow.camera.bottom = -80;
sun.shadow.bias = -0.0002;
scene.add(sun);

const sunTarget = new THREE.Object3D();
scene.add(sunTarget);
sun.target = sunTarget;

const skyGeo = new THREE.SphereGeometry(450, 32, 32);
const skyMat = new THREE.ShaderMaterial({
  uniforms: {
    topColor: { value: new THREE.Color(0x7BA8C8) },
    bottomColor: { value: new THREE.Color(0xD8E8F0) }
  },
  vertexShader: `varying vec3 vWorldPosition; void main() { vWorldPosition = (modelMatrix * vec4(position, 1.0)).xyz; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `uniform vec3 topColor; uniform vec3 bottomColor; varying vec3 vWorldPosition; void main() { float h = normalize(vWorldPosition).y; gl_FragColor = vec4(mix(bottomColor, topColor, max(h, 0.0)), 1.0); }`,
  side: THREE.BackSide
});
const sky = new THREE.Mesh(skyGeo, skyMat);
scene.add(sky);

const scratchSystem = new Scratch(scene);
const car = new Rover_400(scene, scratchSystem);
const world = new CityWorld(scene);
world.init(car);

const Input = { gas: false, brake: false, left: false, right: false };

const setupBtn = (id, action) => {
  const el = document.getElementById(id);
  if (!el) return;
  const start = (e) => { e.preventDefault(); Input[action] = true; el.classList.add('active'); };
  const end = (e) => { e.preventDefault(); Input[action] = false; el.classList.remove('active'); };
  el.addEventListener('touchstart', start, { passive: false });
  el.addEventListener('touchend', end);
  el.addEventListener('touchcancel', end);
  el.addEventListener('pointerdown', start);
  el.addEventListener('pointerup', end);
  el.addEventListener('pointerleave', end);
};

setupBtn('btn-left', 'left');
setupBtn('btn-right', 'right');
setupBtn('pedal-gas', 'gas');
setupBtn('pedal-brake', 'brake');

const sirenBtn = document.getElementById('siren-btn');
sirenBtn.onclick = (e) => {
  e.stopPropagation();
  sirenActive = !sirenActive;
  sirenBtn.classList.toggle('active', sirenActive);
};

document.getElementById('restart-btn').onclick = () => {
  car.reset();
  world.trafficCars.forEach(tc => tc.dispose());
  world.trafficCars = [];
  accidentZones = [];
  missionActive = false;
  missionTarget = null;
  missionTimer = 0;
  document.getElementById('mission-panel').classList.remove('active');
  world.init(car);
};

window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k === 'w' || k === 'arrowup') Input.gas = true;
  if (k === 's' || k === 'arrowdown') Input.brake = true;
  if (k === 'a' || k === 'arrowleft') Input.left = true;
  if (k === 'd' || k === 'arrowright') Input.right = true;
  if (k === 'r') document.getElementById('restart-btn').click();
  if (k === 'l') {
    sirenActive = !sirenActive;
    sirenBtn.classList.toggle('active', sirenActive);
  }
});

window.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  if (k === 'w' || k === 'arrowup') Input.gas = false;
  if (k === 's' || k === 'arrowdown') Input.brake = false;
  if (k === 'a' || k === 'arrowleft') Input.left = false;
  if (k === 'd' || k === 'arrowright') Input.right = false;
});

function updateDamageUI() {
  const fill = document.getElementById('damage-fill');
  const val = document.getElementById('damage-val');
  const percent = Math.round(Utils.clamp(totalDamage, 0, 100));
  
  fill.style.width = percent + '%';
  val.textContent = percent + '%';
  
  if (percent < 30) {
    fill.style.background = 'linear-gradient(90deg, #00ff88, #00cc66)';
  } else if (percent < 70) {
    fill.style.background = 'linear-gradient(90deg, #ffcc00, #ff9900)';
  } else {
    fill.style.background = 'linear-gradient(90deg, #ff4444, #cc0000)';
  }
  
  if (percent >= 100 && !gameOver) {
    car.explode();
  }
}

function addDamage(amount) {
  if (gameOver) return;
  totalDamage = Utils.clamp(totalDamage + amount, 0, 100);
  updateDamageUI();
}

const particlePool = new ObjectPool(() => new Particle(scene), (o,...a) => o.init(...a), CFG.particleMaxCount);
car.explosion.particlePool = particlePool;

car.checkCollision = function(trafficCars) {
  if (gameOver) return;
  
  for (const tc of trafficCars) {
    if (tc.isStopped) continue;
    
    const collided = resolveCollision(this, tc, true);
    
    if (collided) {
      const relSpeed = Math.abs(this.speed - tc.speed);
      const force = Utils.clamp(relSpeed * 0.22, 0, CFG.crashForceMax);
      const impactDir = new THREE.Vector3(this.x - tc.x, 0.3, this.z - tc.z).normalize();
      
      this.applyCrash(force, impactDir, tc.group.position.clone());
      this.speed *= 0.7;
      tc.speed *= 0.6;
      
      world.addAccidentZone(tc.x, tc.z);
      
      if (navigator.vibrate) navigator.vibrate([35, 15, 35]);
    }
  }
  
  if (Math.abs(this.x) > CFG.roadRight - 1.4 || Math.abs(this.x) < CFG.roadLeft + 1.4) {
    if (Math.abs(this.speed) > 3) {
      const side = this.x > 0 ? 1 : -1;
      const impactPoint = new THREE.Vector3(this.x + side * 0.9, 0.4, this.z);
      this.applyCrash(0.18, new THREE.Vector3(-side, 0, 0), impactPoint, true);
    }
  }
};

let lastTime = performance.now();

function animate(now) {
  requestAnimationFrame(animate);
  
  let dt = (now - lastTime) / 1000;
  lastTime = now;
  dt = Math.min(dt, 0.05);
  
  if (slowMoTimer > 0) {
    slowMoTimer -= dt;
    slowMo = 0.25 + (1 - slowMoTimer / 1.2) * 0.75;
  } else {
    slowMo = 1;
  }
  
  const dtScaled = dt * slowMo;
  
  // Обновление погоды
  updateWeather(dtScaled, scene, sun, ambient, skyMat);
  
  car.update(dtScaled, Input);
  world.update();
  car.checkCollision(world.trafficCars);
  particlePool.updateAll(dtScaled, (p, dt) => p.update(dt));
  
  const camOffset = new THREE.Vector3(0, CFG.cameraHeight, CFG.cameraDistance);
  camOffset.applyAxisAngle(new THREE.Vector3(0, 1, 0), car.angle);
  
  const targetCamPos = car.group.position.clone().add(camOffset);
  targetCamPos.y += Math.abs(car.speed) * 0.015;
  
  camera.position.x = Utils.lerp(camera.position.x, targetCamPos.x, CFG.cameraFollowLerp);
  camera.position.y = Utils.lerp(camera.position.y, targetCamPos.y, CFG.cameraFollowLerp);
  camera.position.z = Utils.lerp(camera.position.z, targetCamPos.z, CFG.cameraFollowLerp);
  
  if (cameraShake > 0) {
    camera.position.x += Utils.rand(-1, 1) * cameraShake * 0.3;
    camera.position.y += Utils.rand(-1, 1) * cameraShake * 0.2;
    camera.position.z += Utils.rand(-1, 1) * cameraShake * 0.2;
    cameraShake *= 0.8;
  }
  
  const lookAtPos = car.group.position.clone().add(new THREE.Vector3(0, 1.25, -CFG.cameraLookAhead));
  camera.lookAt(lookAtPos);
  
  sunTarget.position.set(car.x, 0, car.z);
  sun.position.set(car.x + 50, 70, car.z + 40);
  sky.position.copy(camera.position);
  
  document.getElementById('speedo').innerHTML = `${car.getSpeedKMH()} <span>KM/H</span>`;
  
  renderer.render(scene, camera);
}

updateDamageUI();
animate(performance.now());

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());
</script>
