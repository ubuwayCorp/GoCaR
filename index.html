<!-- Подключаем Three.js напрямую (работает при двойном клике) -->
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script>
// ==================== ГЛОБАЛЬНОЕ СОСТОЯНИЕ ====================let totalDamage = 0;
let gameOver = false;
let engineSmoking = false;
let banditsCaught = 0;
let currentBanditLevel = 1;
let missionActive = false;
let missionTarget = null;
let missionTimer = 0;
let accidentZones = [];
let slowMo = 1;
let slowMoTimer = 0;
let cameraShake = 0;
let sirenActive = false;
let lastSparkTime = 0;

// ==================== КОНФИГУРАЦИЯ ====================
const CFG = {
  roadWidth: 32,
  chunkLength: 120,
  spawnAhead: 7,
  despawnBehind: 5,
  mass: 1800,
  maxSpeedReal: 58.0,
  accelerationReal: 7.0,
  brakeDeceleration: 16.0,
  reverseSpeed: -12.0,
  steerMax: 0.48,
  maxSteerAngle: 0.55,
  lateralGrip: 0.998,
  longitudinalGrip: 0.998,
  gripLossSpeed: 70.0,
  cameraDistance: 7.0,
  cameraHeight: 2.4,
  cameraFollowLerp: 0.20,
  cameraLookAhead: 8.0,
  crashForceThreshold: 0.12,
  crashForceMax: 5.0,
  hoodDetachForce: 0.25,
  bumperDetachForce: 0.20,
  bodyDentForce: 0.20,
  doorDamageThreshold: 0.32,
  dentDepth: 0.06,
  dentRadius: 0.5,
  scratchThreshold: 0.06,
  debrisLifetime: 7000,
  debrisMaxCount: 45,
  particleMaxCount: 150,
  maxScratches: 60,
  roadLeft: -15,
  roadRight: 15,  laneWidth: 5.0,
  numLanes: 6,
  trafficSpawnChance: 0.25,
  initialTrafficCount: 22,
  trafficReactionDist: 40,
  trafficLightDist: 120,
  trafficLightCycle: 16,
  banditSpawnInterval: 15,
  banditBaseSpeed: 42,
  banditSpeedIncrease: 6,
  banditEvasionChance: 0.35,
  maxBanditLevel: 5,
  fogColor: 0x9BB8CC,
  fogNear: 80,
  fogFar: 200
};

// ==================== УТИЛИТЫ ====================
const Utils = {
  clamp: (val, min, max) => Math.max(min, Math.min(max, val)),
  lerp: (a, b, t) => a + (b - a) * t,
  rand: (min, max) => min + Math.random() * (max - min),
  randSign: () => Math.random() > 0.5 ? 1 : -1,
  randInt: (min, max) => Math.floor(Math.random() * (max - min + 1)) + min,
  approach: (current, target, rate, dt) => {
    const diff = target - current;
    const maxChange = rate * dt * 60;
    return Math.abs(diff) < maxChange ? target : current + Math.sign(diff) * maxChange;
  },
  disposeObject: (obj) => {
    if (!obj) return;
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
      mats.forEach(m => { if (m.map) m.map.dispose(); if (m.dispose) m.dispose(); });
    }
  }
};

// ==================== ПОГОДА ====================
let currentWeather = 'sunny';
let weatherTransition = 0;
let nextWeather = null;
let scene, sun, ambient, skyMat; // Глобальные ссылки

const weathers = {
  sunny: { name: 'sunny', fogColor: 0x9BB8CC, fogDensity: 0.008, sunIntensity: 1.5, ambientIntensity: 0.65, skyTop: 0x7BA8C8, skyBottom: 0xD8E8F0 },
  rain: { name: 'rain', fogColor: 0x6688AA, fogDensity: 0.02, sunIntensity: 0.7, ambientIntensity: 0.45, skyTop: 0x557799, skyBottom: 0x88AACC },
  fog: { name: 'fog', fogColor: 0xAAAAAA, fogDensity: 0.04, sunIntensity: 0.5, ambientIntensity: 0.55, skyTop: 0xBBBBBB, skyBottom: 0xDDDDDD }
};
function setWeather(weatherName) {
  if (currentWeather === weatherName) return;
  nextWeather = weatherName;
  weatherTransition = 0;
}

function updateWeather(dt) {
  if (nextWeather) {
    weatherTransition += dt * 0.3;
    if (weatherTransition >= 1) {
      currentWeather = nextWeather;
      nextWeather = null;
      weatherTransition = 0;
    }
    
    const from = weathers[currentWeather];
    const to = weathers[nextWeather];
    const t = Math.min(1, weatherTransition);
    
    if (scene && scene.fog) {
      const r = ((from.fogColor >> 16 & 255) * (1-t) + (to.fogColor >> 16 & 255) * t) / 255;
      const g = ((from.fogColor >> 8 & 255) * (1-t) + (to.fogColor >> 8 & 255) * t) / 255;
      const b = ((from.fogColor & 255) * (1-t) + (to.fogColor & 255) * t) / 255;
      scene.fog.color.setRGB(r, g, b);
      scene.fog.density = from.fogDensity * (1-t) + to.fogDensity * t;
    }
    
    if(sun) sun.intensity = from.sunIntensity * (1-t) + to.sunIntensity * t;
    if(ambient) ambient.intensity = from.ambientIntensity * (1-t) + to.ambientIntensity * t;
  }
  
  if (Math.random() < 0.0005 && !nextWeather) {
    const weathersList = ['sunny', 'rain', 'fog'];
    const newWeather = weathersList[Math.floor(Math.random() * weathersList.length)];
    if (newWeather !== currentWeather) setWeather(newWeather);
  }
}

// ==================== ПУЛ ОБЪЕКТОВ ====================
class ObjectPool {
  constructor(createFn, resetFn, initialCount = 15) {
    this.createFn = createFn;
    this.resetFn = resetFn;
    this.pool = [];
    this.active = [];
    for (let i = 0; i < initialCount; i++) this.pool.push(createFn());
  }
  acquire(...args) {
    const obj = this.pool.length > 0 ? this.pool.pop() : this.createFn();    this.resetFn(obj, ...args);
    this.active.push(obj);
    return obj;
  }
  release(obj) {
    const idx = this.active.indexOf(obj);
    if (idx >= 0) { this.active.splice(idx, 1); this.pool.push(obj); }
  }
  releaseAll() { while (this.active.length > 0) this.release(this.active[0]); }
  updateAll(dt, updateFn) {
    for (let i = this.active.length - 1; i >= 0; i--) {
      if (!updateFn(this.active[i], dt)) this.release(this.active[i]);
    }
  }
}

// ==================== ЧАСТИЦЫ ====================
class Particle {
  constructor(sc) {
    this.scene = sc;
    this.mesh = null;
    this.alive = false;
    this.lifetime = 0;
    this.maxLife = 1;
    this.vel = new THREE.Vector3();
    this.rot = new THREE.Vector3();
    this.type = 'spark';
  }
  init(pos, type) {
    this.alive = true;
    this.lifetime = 0;
    this.type = type;
    if (!this.mesh) {
      let geo, mat;
      if (type === 'spark') {
        geo = new THREE.BoxGeometry(0.06, 0.06, 0.06);
        mat = new THREE.MeshBasicMaterial({ color: 0xffdd00 });
      } else if (type === 'fire') {
        geo = new THREE.SphereGeometry(0.14, 8, 8);
        mat = new THREE.MeshBasicMaterial({ color: 0xff5500, transparent: true });
      } else {
        geo = new THREE.SphereGeometry(0.2, 6, 6);
        mat = new THREE.MeshBasicMaterial({ color: type === 'smoke' ? 0x555555 : 0x666666, transparent: true });
      }
      this.mesh = new THREE.Mesh(geo, mat);
      this.scene.add(this.mesh);
    }
    this.mesh.visible = true;
    this.mesh.position.copy(pos);
    this.mesh.position.x += Utils.rand(-0.2, 0.2);    this.mesh.position.y += Utils.rand(0.1, 0.4);
    this.mesh.position.z += Utils.rand(-0.2, 0.2);
    
    const power = type === 'spark' ? 5 : type === 'fire' ? 3 : 2;
    this.vel.set(Utils.rand(-1, 1) * power, Utils.rand(1.5, 3) * (type === 'smoke' ? 0.7 : 1), Utils.rand(-1, 1) * power);
    this.maxLife = type === 'spark' ? Utils.rand(0.25, 0.5) : Utils.rand(0.8, 2.0);
    this.mesh.scale.setScalar(type === 'spark' ? 0.08 : Utils.rand(0.15, 0.4));
    this.mesh.material.opacity = type === 'spark' ? 1 : type === 'fire' ? 0.9 : 0.5;
    this.rot.set(Utils.rand(-10, 10), Utils.rand(-10, 10), Utils.rand(-10, 10));
    return this;
  }
  update(dt) {
    if (!this.alive) return false;
    this.lifetime += dt;
    if (this.lifetime >= this.maxLife) { this.alive = false; this.mesh.visible = false; return false; }
    this.mesh.position.add(this.vel.clone().multiplyScalar(dt));
    this.mesh.rotation.x += this.rot.x * dt;
    this.mesh.rotation.y += this.rot.y * dt;
    this.vel.y -= (this.type === 'smoke' ? 0.1 : 6) * dt;
    this.vel.multiplyScalar(0.98);
    const p = this.lifetime / this.maxLife;
    // Исправлена ошибка с type
    const t = this.type; 
    this.mesh.material.opacity = t === 'fire' ? 0.9*(1-p) : t==='spark' ? 1-p : 0.5*(1-p*0.7);
    this.mesh.scale.multiplyScalar(1 + dt * (t==='spark' ? 0 : 1.5));
    return true;
  }
}

// ==================== ЦАРАПИНЫ ====================
class Scratch {
  constructor(sc) {
    this.scene = sc;
    this.scratches = [];
  }
  add(position, normal, length = 0.5) {
    if (this.scratches.length >= CFG.maxScratches) {
      const old = this.scratches.shift();
      old.forEach(m => { if (m.parent) m.parent.remove(m); Utils.disposeObject(m); });
    }
    const group = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({ color: 0xe8e8e8, metalness: 0.95, roughness: 0.1, emissive: 0x222222 });
    const segments = Math.max(2, Math.floor(length / 0.12));
    for (let i = 0; i < segments; i++) {
      const seg = new THREE.Mesh(new THREE.BoxGeometry(0.025, 0.005, length/segments), mat);
      const offset = (i * length/segments) - length/2;
      seg.position.copy(position);
      seg.position.add(normal.clone().multiplyScalar(0.015));
      seg.position.add(normal.clone().cross(new THREE.Vector3(0,1,0)).multiplyScalar(offset));
      seg.lookAt(seg.position.clone().add(normal));      seg.rotation.z += Utils.rand(-0.3, 0.3);
      group.add(seg);
    }
    this.scene.add(group);
    this.scratches.push(group.children);
    return group;
  }
  clear() {
    this.scratches.forEach(g => { g.forEach(m => { if(m.parent) m.parent.remove(m); Utils.disposeObject(m); }); });
    this.scratches = [];
  }
}

// ==================== ВЗРЫВ ====================
class Explosion {
  constructor(sc, pool) { this.scene = sc; this.particlePool = pool; }
  trigger(pos, power, isBig = false) {
    const count = isBig ? 80 : Math.floor(Utils.lerp(15, 35, Utils.clamp(power/CFG.crashForceMax,0,1)));
    document.getElementById('crash-flash').classList.add('active');
    setTimeout(() => document.getElementById('crash-flash').classList.remove('active'), 60);
    for (let i = 0; i < count; i++) {
      const r = Math.random();
      this.particlePool?.acquire(pos.clone(), r < 0.25 ? 'spark' : r < 0.65 ? 'fire' : 'smoke');
    }
    if (isBig) {
      document.getElementById('explosion-screen').classList.add('active');
      setTimeout(() => document.getElementById('explosion-screen').classList.remove('active'), 2000);
    }
  }
}

// ==================== ОБЛОМКИ ====================
class Debris {
  constructor(sc) {
    this.scene = sc;
    this.mesh = null;
    this.alive = false;
    this.velocity = new THREE.Vector3();
    this.angularVelocity = new THREE.Vector3();
    this.lifetime = 0;
    this.maxLife = CFG.debrisLifetime / 1000;
  }
  init(mesh, pos, quat, vel, angVel) {
    this.alive = true;
    this.lifetime = 0;
    if (!this.mesh) { this.mesh = new THREE.Group(); this.scene.add(this.mesh); }
    while(this.mesh.children.length) this.mesh.remove(this.mesh.children[0]);
    const clone = mesh.clone();
    if (mesh.geometry) clone.geometry = mesh.geometry.clone();
    if (mesh.material) clone.material = mesh.material.clone();    this.mesh.add(clone);
    this.mesh.position.copy(pos);
    this.mesh.quaternion.copy(quat);
    this.mesh.visible = true;
    this.velocity.copy(vel);
    this.angularVelocity.copy(angVel);
    return this;
  }
  update(dt) {
    if (!this.alive) return false;
    this.lifetime += dt;
    if (this.lifetime >= this.maxLife) { this.alive = false; this.mesh.visible = false; return false; }
    this.mesh.position.add(this.velocity.clone().multiplyScalar(dt));
    this.mesh.rotation.x += this.angularVelocity.x * dt;
    this.mesh.rotation.y += this.angularVelocity.y * dt;
    this.mesh.rotation.z += this.angularVelocity.z * dt;
    this.velocity.y -= 15 * dt;
    if (this.mesh.position.y < 0.12) {
      this.mesh.position.y = 0.12;
      if (Math.abs(this.velocity.y) > 0.5) { this.velocity.y *= -0.2; this.velocity.x *= 0.85; this.velocity.z *= 0.85; }
      else { this.velocity.y = 0; this.velocity.x *= 0.9; this.velocity.z *= 0.9; }
      this.angularVelocity.multiplyScalar(0.9);
    }
    this.velocity.multiplyScalar(0.99);
    this.angularVelocity.multiplyScalar(0.97);
    return true;
  }
}

class TrafficCar {
  constructor(sc, laneX, direction, startPos, trafficLightsRef, type = 'sedan', isBandit = false) {
    this.scene = sc;
    this.x = laneX;
    this.direction = direction;
    this.type = type;
    this.isBandit = isBandit;
    this.group = new THREE.Group();
    this.trafficLights = trafficLightsRef;
    this.isStopped = false;
    this.isMissionTarget = false;
    this.missionArrow = null;
    this.banditLevel = 0;
    this.evasionTimer = 0;
    this.targetLane = laneX;
    this.mass = type === 'kamaz' ? 5000 : type === 'bus' ? 4000 : 1600;
    
    let speedKMH;
    if (isBandit) speedKMH = Utils.clamp(CFG.banditBaseSpeed + (currentBanditLevel - 1) * CFG.banditSpeedIncrease, 40, 80);
    else speedKMH = Utils.rand(75, 130);
    
    this.speed = (speedKMH / 3.6) * direction;
    this.targetSpeed = this.speed;
    this.z = startPos;
    
    this.build();
    sc.add(this.group);
    this.updatePosition();
  }
  
  build() {
    const g = this.group;
    const darkMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, metalness: 0.7 });
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x080808, roughness: 0.95 });
    const rimMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.85 });
    
    const addWheel = (x, z, r=0.3) => {
      const wg = new THREE.Group();      const tire = new THREE.Mesh(new THREE.TorusGeometry(r, r*0.35, 12, 24), wheelMat);
      tire.rotation.y = Math.PI/2;
      wg.add(tire);
      const rim = new THREE.Mesh(new THREE.CylinderGeometry(r*0.75, r*0.75, r*0.3, 20), rimMat);
      rim.rotation.z = Math.PI/2;
      wg.add(rim);
      wg.position.set(x, r, z);
      g.add(wg);
    };

    if (this.isBandit) {
      const m = new THREE.MeshStandardMaterial({ color: 0x110505, metalness: 0.9, roughness: 0.15, clearcoat: 1 });
      g.add(new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.45, 4.4), m).translateY(0.4));
      g.add(new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.35, 1.9), darkMat).translateY(0.8).translateZ(-0.2));
      [-0.9, 0.9].forEach(x => g.add(new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.04, 4.3), new THREE.MeshStandardMaterial({color:0xcc0000})).translateY(0.6).translateX(x)));
      
    } else if (this.type === 'kamaz') {
      const cabinMat = new THREE.MeshStandardMaterial({ color: Utils.randInt(0x334455, 0x556677), metalness: 0.5 });
      const cabin = new THREE.Mesh(new THREE.BoxGeometry(2.4, 2.2, 2.5), cabinMat);
      cabin.position.set(0, 1.2, -2);
      g.add(cabin);
      g.add(new THREE.Mesh(new THREE.BoxGeometry(2.3, 0.5, 2.3), cabinMat).translateY(2.4).translateZ(-2.1));
      
      const bed = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2.8, 6.5), new THREE.MeshStandardMaterial({color: 0x889999, metalness: 0.3}));
      bed.position.set(0, 1.6, 2.5);
      g.add(bed);
      
      [[-1.1,-2.8],[1.1,-2.8],[-1.1,2],[1.1,2],[-1.1,4.5],[1.1,4.5]].forEach(([x,z])=>addWheel(x,z,0.45));
      return;
      
    } else if (this.type === 'bus') {
      g.add(new THREE.Mesh(new THREE.BoxGeometry(2.6, 2.8, 10), new THREE.MeshStandardMaterial({color:0xd4c832})).translateY(1.4));
      g.add(new THREE.Mesh(new THREE.BoxGeometry(2.5, 1.2, 7), new THREE.MeshStandardMaterial({color:0x334455,metalness:0.9})).translateY(2.2).translateZ(0.5));
      [[-1.1,-3.5],[1.1,-3.5],[-1.1,3.5],[1.1,3.5]].forEach(([x,z])=>addWheel(x,z,0.5));
      return;
      
    } else if (this.type === 'minivan') {
      const colors = [0x8899aa, 0x556677, 0x223344, 0x99aabb];
      const m = new THREE.MeshStandardMaterial({ color: colors[Utils.randInt(0,3)], metalness: 0.75 });
      g.add(new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.8, 5.2), m).translateY(0.6));
      g.add(new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.5, 3.5), darkMat).translateY(1.1).translateZ(0.2));
      [[-0.9,-1.8],[0.9,-1.8],[-0.9,1.6],[0.9,1.6]].forEach(([x,z])=>addWheel(x,z,0.35));
      return;
    }
    
    const colors = [0x2255aa, 0x883333, 0x222233, 0x667788, 0xaa8855, 0x336644, 0x445566];
    const m = new THREE.MeshStandardMaterial({ color: colors[Utils.randInt(0,6)], metalness: 0.85, roughness: 0.15, clearcoat: 0.9 });
    g.add(new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.48, 4.3), m).translateY(0.42));
    g.add(new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.35, 1.8), darkMat).translateY(0.75).translateZ(-0.2));
    [[-0.85,-1.5],[0.85,-1.5],[-0.85,1.4],[0.85,1.4]].forEach(([x,z])=>addWheel(x,z,0.32));  }
  
  setMissionTarget(arrow, level = 1) {
    this.isMissionTarget = true;
    this.missionArrow = arrow;
    this.banditLevel = level;
  }
  
  updatePosition() {
    this.group.position.set(this.x, 0.02, this.z);
    this.group.rotation.y = this.direction === -1 ? 0 : Math.PI;
  }
  
  getBoundingBox() {
    return new THREE.Box3().setFromObject(this.group).expandByScalar(-0.15);
  }
  
  checkAccidentZones() {
    if (this.isBandit) return false;
    for (const zone of accidentZones) {
      if (Math.abs(this.z - zone.z) < CFG.trafficReactionDist && Math.abs(this.x - zone.x) < CFG.laneWidth * 0.7) {
        if ((this.direction === -1 && this.z > zone.z) || (this.direction === 1 && this.z < zone.z)) continue;
        return true;
      }
    }
    return false;
  }
  
  evadePlayer(playerX, playerZ) {
    if (!this.isBandit) return;
    const dist = Math.abs(this.z - playerZ);
    if (dist < 70 && dist > 5) {
      this.evasionTimer += 0.016;
      const evadeRate = 0.25 + this.banditLevel * 0.08;
      const evadeThreshold = Math.max(0.5, 2.0 - this.banditLevel * 0.3);
      
      if (this.evasionTimer > evadeThreshold && Math.random() < evadeRate) {
        const currentLaneIdx = Math.round((this.x / CFG.laneWidth) + 3.5);
        const shift = Math.random() < 0.5 ? -1 : 1;
        const newLane = Math.max(1, Math.min(6, currentLaneIdx + shift));
        this.targetLane = (newLane - 3.5) * CFG.laneWidth;
        this.evasionTimer = 0;
        
        document.getElementById('bandit-warning').style.display = 'block';
        setTimeout(() => document.getElementById('bandit-warning').style.display = 'none', 1200);
      }
      
      this.targetSpeed = this.speed * (1.0 + this.banditLevel * 0.06 + (40 - dist) * 0.005);
      if (this.banditLevel >= 3 && Math.random() < 0.3) this.targetSpeed = Math.abs(this.speed) * 1.1 * this.direction;
    } else {      this.targetSpeed = this.speed;
    }
    
    this.x = Utils.lerp(this.x, this.targetLane, 0.06 + this.banditLevel * 0.02);
  }
  
  update(dt, playerZ, playerX) {
    if (this.isStopped) {
      this.speed = Utils.approach(this.speed, 0, 8, dt);
      this.updatePosition();
      if (this.missionArrow) this.missionArrow.hide();
      return this.z > playerZ + 350 || this.z < playerZ - 300;
    }
    
    this.evadePlayer(playerX, playerZ);
    if (!this.isBandit && this.checkAccidentZones()) this.isStopped = true;
    
    if (this.trafficLights && this.direction === -1 && !this.isBandit) {
      for (const light of this.trafficLights) {
        if (light.state === 'red') {
          const dist = this.z - light.z;
          if (dist > 0 && dist < 30 && this.speed > 0) this.speed = Math.max(0, this.speed - 8 * dt);
        }
      }
    }
    
    this.speed = Utils.approach(this.speed, this.targetSpeed, 4, dt);
    this.z += this.speed * dt;
    this.updatePosition();
    
    if (this.isMissionTarget && this.missionArrow) {
      this.missionArrow.show();
      this.missionArrow.update(this.group.position, camera);
    }
    return this.z > playerZ + 350 || this.z < playerZ - 300;
  }
  
  dispose() {
    if (this.missionArrow) this.missionArrow.hide();
    this.group.traverse(obj => { if (obj.geometry) obj.geometry.dispose(); });
    this.scene.remove(this.group);
  }
}

// ==================== ROVER 400 POLIZEI ====================
class Rover_400 {
  constructor(sc, scratchSystem) {
    this.scene = sc;
    this.scratchSystem = scratchSystem;
    this.group = new THREE.Group();
    this.wheels = [];
    this.parts = [];
    this.speed = 0; this.x = 0; this.z = 0; this.angle = 0; this.steer = 0;
    this.throttleInput = 0; this.brakeInput = 0; this.lastImpact = 0;
    this.debrisPool = new ObjectPool(() => new Debris(sc), (o,...a) => o.init(...a), 25);
    this.explosion = new Explosion(sc, null);
    this.build();
    sc.add(this.group);
  }
  
  addPart(mesh, name, threshold, isWheel = false) {
    const part = { mesh, name, threshold, attached: true, isWheel, originalPos: mesh.position.clone(), originalQuat: mesh.quaternion.clone() };
    this.parts.push(part);    if (name === 'hood') this.hoodPart = part;
    if (name === 'bumper_f') this.frontBumperPart = part;
    if (name === 'bumper_r') this.rearBumperPart = part;
    if (name === 'body') this.bodyMesh = mesh;
    return part;
  }
  
  addDent(mesh, localImpact, force) {
    if (!mesh?.geometry?.attributes?.position) return;
    const pos = mesh.geometry.attributes.position;
    const radius = CFG.dentRadius + force * 0.2;
    const depth = CFG.dentDepth + force * 0.04;
    for (let i = 0; i < pos.count; i++) {
      const vx = pos.getX(i), vy = pos.getY(i), vz = pos.getZ(i);
      const dist = Math.sqrt((vx-localImpact.x)**2 + (vy-localImpact.y)**2 + (vz-localImpact.z)**2);
      if (dist < radius) {
        const f = 1 - dist/radius;
        pos.setXYZ(i, vx - (vx-localImpact.x)/(dist||1)*depth*f, vy - (vy-localImpact.y)/(dist||1)*depth*f, vz - (vz-localImpact.z)/(dist||1)*depth*f);
      }
    }
    pos.needsUpdate = true;
    mesh.geometry.computeVertexNormals();
  }
  
  detachPart(part, force, impactDir, impactPoint) {
    if (!part.attached) return;
    part.attached = false;
    const pos = new THREE.Vector3(), quat = new THREE.Quaternion();
    part.mesh.getWorldPosition(pos); part.mesh.getWorldQuaternion(quat);
    const sp = Math.min(1, Math.abs(this.speed)/CFG.maxSpeedReal);
    const vel = new THREE.Vector3(impactDir.x*force*9 + Math.sin(this.angle)*this.speed*0.7, force*6 + Utils.rand(1.5,3), impactDir.z*force*9 + Math.cos(this.angle)*this.speed*0.7).multiplyScalar(0.6 + sp*0.4);
    const ang = new THREE.Vector3(Utils.randSign()*Utils.rand(12,25), Utils.randSign()*Utils.rand(12,25), Utils.randSign()*Utils.rand(12,25));
    if (this.debrisPool.active.length < CFG.debrisMaxCount) this.debrisPool.acquire(part.mesh, pos, quat, vel, ang);
    part.mesh.visible = false;
  }
  
  applyCrash(force, impactDir, impactPoint, isScraping = false) {
    if (isScraping && force >= CFG.scratchThreshold) {
      const now = performance.now();
      if (now - lastSparkTime > 35) {
        lastSparkTime = now;
        this.scratchSystem.add(impactPoint.clone(), impactDir.clone().negate(), 0.3 + force * 0.4);
        particlePool?.acquire(impactPoint.clone(), 'spark');
        particlePool?.acquire(impactPoint.clone(), 'spark');
      }
      return;
    }
    if (force < CFG.crashForceThreshold) return;
    
    const now = performance.now() / 1000;    if (now - this.lastImpact < 0.15) return;
    this.lastImpact = now;
    
    const carForward = new THREE.Vector3(Math.sin(this.angle), 0, Math.cos(this.angle));
    const impactDot = impactDir.dot(carForward);
    
    if (this.bodyMesh && force >= CFG.bodyDentForce) {
      const local = impactPoint.clone(); this.bodyMesh.worldToLocal(local);
      this.addDent(this.bodyMesh, local, force * 0.7);
      addDamage(force * 3);
    }
    if (impactDot > 0.25 && this.hoodPart?.attached && force >= CFG.hoodDetachForce) { this.detachPart(this.hoodPart, force, impactDir, impactPoint); addDamage(force * 5); }
    if (impactDot > 0.4 && this.frontBumperPart?.attached && force >= CFG.bumperDetachForce) { this.detachPart(this.frontBumperPart, force, impactDir, impactPoint); addDamage(force * 4); }
    if (impactDot < -0.4 && this.rearBumperPart?.attached && force >= CFG.bumperDetachForce) { this.detachPart(this.rearBumperPart, force, impactDir, impactPoint); addDamage(force * 4); }
    
    addDamage(force * 2);
    if (force > 0.5) this.explosion.trigger(impactPoint.clone(), force * 0.8);
    
    cameraShake = Utils.clamp(force * 0.5, 0, 1);
    if (force > 0.8 && totalDamage > 60) { slowMo = 0.25; slowMoTimer = 0.4; }
    if (navigator.vibrate) navigator.vibrate([20, 10, 20]);
  }
  
  build() {
    const g = this.group;
    // СЕРО-БЕЛЫЙ ПОЛИЦЕЙСКИЙ ЦВЕТ
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xd8dbe6, metalness: 0.85, roughness: 0.15, clearcoat: 1.0, clearcoatRoughness: 0.04 });

    this.sirenLight = new THREE.Group();
    this.sirenLight.add(new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.06, 0.26), new THREE.MeshStandardMaterial({color:0x0a0a0a})).translateY(0.8));
    this.sirenDome = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.08, 0.12, 18), new THREE.MeshStandardMaterial({color:0x0044ff,emissive:0x0088ff,emissiveIntensity:0.5,transparent:true,opacity:0.9}));
    this.sirenDome.position.y = 0.9;
    this.sirenLight.add(this.sirenDome);
    this.sirenLight.position.set(-0.72, 0, 1.95);
    g.add(this.sirenLight);

    fb.position.z = -2.42; g.add(fb);
    this.addPart(fb, 'bumper_f', 0.16);
    
    const rb = new THREE.Group();
    rb.add(new THREE.Mesh(new THREE.BoxGeometry(1.85, 0.26, 0.16), bodyMat).translateY(0.3));
    rb.position.z = 2.42; g.add(rb);

  update(dt, input) {
    if (gameOver) return;
    const dtNorm = Math.min(dt, 0.033);
    
    if (input.gas && !input.brake) this.throttleInput = 1;
    else if (input.brake) this.throttleInput = Math.abs(this.speed) < 0.5 ? -1 : 0;
    else this.throttleInput = 0;
    this.brakeInput = input.brake ? 1 : 0;
        if (this.throttleInput > 0) this.speed += CFG.accelerationReal * this.throttleInput * dtNorm;
    else if (this.throttleInput < 0) this.speed += CFG.accelerationReal * 0.4 * this.throttleInput * dtNorm;
    
    if (this.brakeInput) {
      this.speed -= Math.sign(this.speed) * CFG.brakeDeceleration * this.brakeInput * dtNorm;
      if (Math.abs(this.speed) < 0.1) this.speed = 0;
    }
    this.speed *= Math.pow(0.9995, dtNorm * 60);
    this.speed = Utils.clamp(this.speed, CFG.reverseSpeed, CFG.maxSpeedReal * (1 - totalDamage/100 * 0.6));
    
    const steerInput = (input.left ? -1 : 0) + (input.right ? 1 : 0);
    const targetSteer = Utils.clamp(steerInput * CFG.steerMax, -CFG.steerMax, CFG.steerMax);
    
    // ПЛАВНЫЙ ПОВОРОТ
    const steerLerpFactor = 0.08 + Math.abs(this.speed) * 0.006;
    this.steer = Utils.lerp(this.steer, targetSteer, steerLerpFactor);
    
    if (Math.abs(this.speed) > 0.5) {
      const steerAngle = this.steer * CFG.maxSteerAngle;
      const yaw = (this.speed * Math.tan(steerAngle)) / 2.8;
      const grip = Math.max(0.86, 1.0 - Math.pow(Math.abs(this.speed)/CFG.gripLossSpeed, 1.2));
      this.angle += yaw * grip * dtNorm;
    } else {
      this.steer *= 0.9;
    }
    
    this.x += Math.sin(this.angle) * this.speed * dtNorm;
    this.z -= Math.cos(this.angle) * this.speed * dtNorm;
    this.x = Utils.clamp(this.x, CFG.roadLeft + 1.2, CFG.roadRight - 1.2);
    
    this.group.position.set(this.x, 0.02, this.z);
    this.group.rotation.y = this.angle;
    
    const wr = this.speed * dtNorm * 18;
    this.wheels.forEach((w, i) => {
      w.rotation.x += wr;
      if (i < 2) w.rotation.y = this.steer * 0.6;
    });
    
    if (sirenActive) {
      const t = Math.sin(performance.now() * 0.025) > 0 ? 5.0 : 1.5;
      this.sirenDome.material.emissiveIntensity = t;
    } else {
      this.sirenDome.material.emissiveIntensity = 0.4;
    }
    
    if (totalDamage >= 60 && !engineSmoking) {
      engineSmoking = true;
      document.getElementById('engine-smoke').classList.add('active');
    }    if (engineSmoking && Math.random() < 0.35) {
      const sp = this.group.localToWorld(this.engineSmokePoint.clone());
      particlePool?.acquire(sp, 'engineSmoke');
    }
    
    this.debrisPool.updateAll(dtNorm, (d, dt) => d.update(dt));
  }
  
  getSpeedKMH() { return Math.floor(Math.abs(this.speed) * 3.6); }
  getBoundingBox() { return new THREE.Box3().setFromObject(this.group).expandByScalar(-0.15); }
  
  explode() {
    gameOver = true; totalDamage = 100; updateDamageUI();
    this.explosion.trigger(this.group.position.clone(), CFG.crashForceMax, true);
    slowMo = 0.15; slowMoTimer = 1.0; cameraShake = 1;
    this.parts.forEach(p => {
      if (p.attached && !p.isWheel) {
        p.attached = false;
        const pos=new THREE.Vector3(), quat=new THREE.Quaternion();
        p.mesh.getWorldPosition(pos); p.mesh.getWorldQuaternion(quat);
        if (this.debrisPool.active.length < CFG.debrisMaxCount)
          this.debrisPool.acquire(p.mesh, pos, quat, new THREE.Vector3(Utils.rand(-8,8),Utils.rand(8,16),Utils.rand(-8,8)), new THREE.Vector3(Utils.rand(-20,20),Utils.rand(-20,20),Utils.rand(-20,20)));
        p.mesh.visible = false;
      }
    });
    setTimeout(() => document.getElementById('gameover').classList.add('active'), 800);
  }
  
  reset() {
    this.speed=0; this.x=0; this.z=0; this.angle=0; this.steer=0;
    this.throttleInput=0; this.brakeInput=0;
    this.parts.forEach(p => { p.attached=true; p.mesh.visible=true; p.mesh.position.copy(p.originalPos); p.mesh.quaternion.copy(p.originalQuat); });
    this.debrisPool.releaseAll();
    totalDamage=0; gameOver=false; engineSmoking=false;
    banditsCaught=0; currentBanditLevel=1;
    document.getElementById('engine-smoke').classList.remove('active');
    document.getElementById('bandit-counter').classList.remove('active');
    document.getElementById('gameover').classList.remove('active');
    document.getElementById('explosion-screen').classList.remove('active');
    this.scratchSystem.clear();
    updateDamageUI();
  }
}

const Materials = {
  asphalt: new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 }),
  grass: new THREE.MeshStandardMaterial({ color: 0x2a5a1a, roughness: 0.95 }),
  concrete: new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.8 }),
  brick: new THREE.MeshStandardMaterial({ color: 0x8b4513, roughness: 0.8 }),  brickRed: new THREE.MeshStandardMaterial({ color: 0xa84433, roughness: 0.8 }),
  glass: new THREE.MeshStandardMaterial({ color: 0x446688, metalness: 0.9, roughness: 0.05, transparent: true, opacity: 0.7 }),
  window: new THREE.MeshStandardMaterial({ color: 0x6688aa, metalness: 0.9, emissive: 0x112244, emissiveIntensity: 0.3 }),
  shopWindow: new THREE.MeshStandardMaterial({ color: 0x88aacc, metalness: 0.9, emissive: 0x446688, emissiveIntensity: 0.5 }),
  roof: new THREE.MeshStandardMaterial({ color: 0x333344 }),
  roofRed: new THREE.MeshStandardMaterial({ color: 0x8b3333 }),
  sign: new THREE.MeshStandardMaterial({ color: 0xff4444, emissive: 0x440000, emissiveIntensity: 0.4 })
};

class Building {
  constructor(sc, x, z, w, d, h, type = 'residential') {
    this.scene = sc; this.group = new THREE.Group();
    this.x = x; this.z = z; this.type = type;
    this.build(w, d, h);
    this.group.position.set(x, 0, z);
    sc.add(this.group);
  }
  build(w, d, h) {
    const g = this.group;
    let main;
    if (this.type === 'skyscraper') {
      main = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), Materials.glass);
      g.add(main.translateY(h/2));
      for(let y=0;y<h;y+=4) g.add(new THREE.Mesh(new THREE.BoxGeometry(w+0.1,0.3,d+0.1), new THREE.MeshStandardMaterial({color:0x223344,metalness:0.8})).translateY(y));
      g.add(new THREE.Mesh(new THREE.BoxGeometry(w*0.5,3,d*0.5), Materials.concrete).translateY(h+1.5));
    } else if (this.type === 'shop') {
      main = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), Materials.brickRed).translateY(h/2); g.add(main);
      g.add(new THREE.Mesh(new THREE.BoxGeometry(w-0.6,2.2,0.1), Materials.shopWindow).translateY(1.4).translateZ(d/2+0.05));
      g.add(new THREE.Mesh(new THREE.BoxGeometry(w-0.4,0.5,0.06), Materials.sign).translateY(3.2).translateZ(d/2+0.1));
      g.add(new THREE.Mesh(new THREE.BoxGeometry(w-0.4,0.05,1.2), new THREE.MeshStandardMaterial({color:0xcc3333})).translateY(2.6).translateZ(d/2+0.6));
    } else if (this.type === 'modern') {
      main = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), Materials.concrete).translateY(h/2); g.add(main);
      g.add(new THREE.Mesh(new THREE.BoxGeometry(w*0.6,h*0.7,0.08), Materials.glass).translateY(h/2).translateZ(d/2+0.05));
      for(let f=1;f<h/3;f++) g.add(new THREE.Mesh(new THREE.BoxGeometry(w+0.4,0.1,0.7), Materials.concrete).translateY(f*3).translateZ(d/2+0.35));
    } else if (this.type === 'old') {
      main = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), Materials.brick).translateY(h/2); g.add(main);
      g.add(new THREE.Mesh(new THREE.BoxGeometry(w+0.3,0.3,d+0.3), Materials.roofRed).translateY(h+0.1));
      for(let f=0;f<h/3-0.5;f++) for(let wx=-w/2+1.2;wx<w/2-1.2;wx+=2) g.add(new THREE.Mesh(new THREE.BoxGeometry(0.05,1.2,0.6), Materials.window).translateY(f*3+1.5).translateZ(d/2+0.04).translateX(wx));
    } else if (this.type === 'warehouse') {
      g.add(new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color:0x667788,roughness:0.7})).translateY(h/2));
      g.add(new THREE.Mesh(new THREE.BoxGeometry(w*0.5,h*0.6,0.08), new THREE.MeshStandardMaterial({color:0x334455})).translateY(h*0.3).translateZ(d/2+0.04));
    } else {
      main = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), Materials.brick).translateY(h/2); g.add(main);
      g.add(new THREE.Mesh(new THREE.BoxGeometry(w+0.2,0.2,d+0.2), Materials.roof).translateY(h+0.1));
      for(let f=0;f<h/3.2;f++) for(let wx=-w/2+1.3;wx<w/2-1.3;wx+=2.3) g.add(new THREE.Mesh(new THREE.BoxGeometry(0.05,1.3,0.7), Materials.window).translateY(f*3.2+1.6).translateZ(d/2+0.04).translateX(wx));
    }
  }
  dispose() { this.group.traverse(Utils.disposeObject); this.scene.remove(this.group); }
}
// ==================== ГОРОД ====================
class CityWorld {
  constructor(sc) {
    this.scene = sc;
    this.chunks = new Map();
    this.nextZ = 0;
    this.car = null;
    this.trafficCars = [];
    this.trafficLights = [];
    this.buildings = [];
    this.lastLightSpawn = 0;
    this.missionArrow = new MissionArrow(sc);
  }
  reset() {
    for (const [z, chunk] of this.chunks) { chunk.traverse(Utils.disposeObject); this.scene.remove(chunk); }
    this.chunks.clear();
    this.buildings.forEach(b => b.dispose()); this.buildings = [];
    this.trafficCars.forEach(tc => tc.dispose()); this.trafficCars = [];
    this.trafficLights = []; this.lastLightSpawn = 0; this.nextZ = 0;
    if (this.missionArrow) this.missionArrow.hide();
  }
  getLaneX(idx) { return (idx - 3.5) * CFG.laneWidth; }
  
  spawnChunk(z) {
    if (this.chunks.has(z)) return;
    const g = new THREE.Group(); g.position.z = z;
    
    g.add(new THREE.Mesh(new THREE.PlaneGeometry(100, CFG.chunkLength), Materials.grass).rotateX(-Math.PI/2).translateY(0.001));
    const swMat = new THREE.MeshStandardMaterial({color:0x999999,roughness:0.8});
    g.add(new THREE.Mesh(new THREE.PlaneGeometry(4, CFG.chunkLength), swMat).rotateX(-Math.PI/2).translateY(0.002).translateX(CFG.roadLeft-2));
    g.add(new THREE.Mesh(new THREE.PlaneGeometry(4, CFG.chunkLength), swMat).rotateX(-Math.PI/2).translateY(0.002).translateX(CFG.roadRight+2));
    const cMat = new THREE.MeshStandardMaterial({color:0x666666});
    g.add(new THREE.Mesh(new THREE.BoxGeometry(0.25,0.12,CFG.chunkLength), cMat).translateY(0.06).translateX(CFG.roadLeft-0.2));
    g.add(new THREE.Mesh(new THREE.BoxGeometry(0.25,0.12,CFG.chunkLength), cMat).translateY(0.06).translateX(CFG.roadRight+0.2));
    g.add(new THREE.Mesh(new THREE.PlaneGeometry(CFG.roadWidth, CFG.chunkLength), Materials.asphalt).rotateX(-Math.PI/2).translateY(0.001));
    
    // Разметка
    g.add(new THREE.Mesh(new THREE.PlaneGeometry(0.25, CFG.chunkLength), new THREE.MeshStandardMaterial({color:0xffcc00})).rotateX(-Math.PI/2).translateY(0.004));
    const stripeMat = new THREE.MeshStandardMaterial({color:0xffffff});
    for(let l=1;l<6;l++) {
      if(l===3) continue;
      const x = this.getLaneX(l) + CFG.laneWidth/2;
      for(let sz=-CFG.chunkLength/2;sz<CFG.chunkLength/2;sz+=10)
        g.add(new THREE.Mesh(new THREE.PlaneGeometry(0.1,4), stripeMat).rotateX(-Math.PI/2).translateY(0.003).translateX(x).translateZ(sz));
    }
    g.add(new THREE.Mesh(new THREE.PlaneGeometry(0.15, CFG.chunkLength), stripeMat).rotateX(-Math.PI/2).translateY(0.004).translateX(CFG.roadLeft+0.1));
    g.add(new THREE.Mesh(new THREE.PlaneGeometry(0.15, CFG.chunkLength), stripeMat).rotateX(-Math.PI/2).translateY(0.004).translateX(CFG.roadRight-0.1));
    
    const off = CFG.roadRight + 6;
    let cz = -CFG.chunkLength/2 + 8;    const types = ['residential','shop','modern','old','warehouse','skyscraper'];
    while(cz < CFG.chunkLength/2 - 8) {
      const w = 8+Math.random()*6, d = 7+Math.random()*5, h = Math.random()<0.15 ? 25+Math.random()*20 : 10+Math.random()*15;
      this.buildings.push(new Building(this.scene, off+d/2, z+cz, w, d, h, types[Utils.randInt(0,5)]));
      this.buildings.push(new Building(this.scene, -off-d/2, z+cz, w, d, h, types[Utils.randInt(0,5)]));
      cz += d + 5 + Math.random()*6;
    }
    if(z - this.lastLightSpawn >= CFG.trafficLightDist) {
      this.trafficLights.push(new TrafficLight(this.scene, CFG.roadRight+2, z));
      this.lastLightSpawn = z;
    }
    this.scene.add(g);
    this.chunks.set(z, g);
  }
  
  init(car) {
    this.car = car;
    for(let i=0;i<CFG.spawnAhead;i++) { this.spawnChunk(this.nextZ); this.nextZ -= CFG.chunkLength; }
    
    // СТРОГИЕ ПОЛОСЫ: Справа(4,5,6) -> Вперёд(-1), Слева(1,2,3) -> Назад(1)
    const fwdLanes = [4,5,6], bwdLanes = [1,2,3];
    const types = ['sedan','sedan','sport','minivan','kamaz','bus'];
    for(let i=0;i<CFG.initialTrafficCount;i++) {
      const isFwd = i%2===0;
      const lane = isFwd ? fwdLanes[Utils.randInt(0,2)] : bwdLanes[Utils.randInt(0,2)];
      const dir = isFwd ? -1 : 1;
      this.trafficCars.push(new TrafficCar(this.scene, this.getLaneX(lane), dir, -Utils.rand(30,250)-i*18, this.trafficLights, types[Utils.randInt(0,5)]));
    }
  }
  
  spawnBandit() {
    if(missionActive || gameOver) return;
    const lane = 4 + Math.floor(Math.random()*3); // Всегда справа
    missionTarget = new TrafficCar(this.scene, this.getLaneX(lane), -1, this.car.z - 140, this.trafficLights, 'sedan', true);
    missionTarget.setMissionTarget(this.missionArrow, currentBanditLevel);
    this.trafficCars.push(missionTarget);
    missionActive = true;
    document.getElementById('mission-panel').classList.add('active');
  }
  
  checkMission() {
    if(!missionActive || !missionTarget) return;
    if(this.car.getBoundingBox().intersectsBox(missionTarget.getBoundingBox())) {
      missionActive = false;
      document.getElementById('mission-panel').classList.remove('active');
      banditsCaught++;
      currentBanditLevel = Math.min(currentBanditLevel+1, CFG.maxBanditLevel);
      document.getElementById('bandit-counter').classList.add('active');
      document.getElementById('bandit-counter').textContent = `🚔 Бандитов поймано: ${banditsCaught}`;
      totalDamage = Math.max(0, totalDamage-20); updateDamageUI();      missionTarget.isStopped = true; missionTarget = null; missionTimer = 0;
    }
  }
  
  update() {
    if(!this.car || gameOver) return;
    const cz = this.car.z;
    while(this.nextZ > cz - CFG.spawnAhead*CFG.chunkLength) { this.spawnChunk(this.nextZ); this.nextZ -= CFG.chunkLength; }
    
    if(this.trafficCars.length < 25 && Math.random() < CFG.trafficSpawnChance) {
      const isFwd = Math.random()<0.5;
      const lane = isFwd ? 4+Math.floor(Math.random()*3) : 1+Math.floor(Math.random()*3);
      const dir = isFwd ? -1 : 1;
      this.trafficCars.push(new TrafficCar(this.scene, this.getLaneX(lane), dir, cz - Utils.rand(160,300)*(isFwd?1:-1), this.trafficLights, ['sedan','minivan','kamaz','bus'][Utils.randInt(0,3)]));
    }
    
    missionTimer += 0.016;
    if(missionTimer >= CFG.banditSpawnInterval && !missionActive) this.spawnBandit();
    this.checkMission();
    
    for(let i=this.trafficCars.length-1;i>=0;i--) {
      if(this.trafficCars[i].update(0.016, cz, this.car.x)) {
        if(this.trafficCars[i]===missionTarget){ missionActive=false; missionTarget=null; document.getElementById('mission-panel').classList.remove('active'); }
        this.trafficCars[i].dispose(); this.trafficCars.splice(i,1);
      }
    }
    this.trafficLights.forEach(l=>l.update(0.016));
    
    for(const [z, chunk] of this.chunks) if(z>cz+CFG.despawnBehind*CFG.chunkLength){ chunk.traverse(Utils.disposeObject); this.scene.remove(chunk); this.chunks.delete(z); }
    for(let i=this.buildings.length-1;i>=0;i--) if(this.buildings[i].z>cz+CFG.despawnBehind*CFG.chunkLength+50){ this.buildings[i].dispose(); this.buildings.splice(i,1); }
    accidentZones = accidentZones.filter(zn => Math.abs(zn.z-cz)<200);
  }
  addAccidentZone(x,z) { accidentZones.push({x,z,time:performance.now()}); }
}

// ==================== КОЛЛИЗИИ (ОТТАЛКИВАНИЕ + ИМПУЛЬС) ====================
function resolveCollision(car, other, isPlayer=false) {
  const cBox = car.getBoundingBox(), oBox = other.getBoundingBox();
  if(!cBox.intersectsBox(oBox)) return false;
  
  const ox = Math.min(cBox.max.x, oBox.max.x) - Math.max(cBox.min.x, oBox.min.x);
  const oz = Math.min(cBox.max.z, oBox.max.z) - Math.max(cBox.min.z, oBox.min.z);
  
  if(ox < oz) {
    const push = ox/2 + 0.12;
    const dir = car.x < other.x ? -1 : 1;
    car.x += dir*push; other.x -= dir*push;
  } else {
    const push = oz/2 + 0.12;
    const dir = car.z < other.z ? -1 : 1;    car.z += dir*push; other.z -= dir*push;
  }
  car.group.position.set(car.x, 0.02, car.z);
  other.group.position.set(other.x, 0.02, other.z);
  
  // Физика отскока
  const m1 = isPlayer ? CFG.mass : (car.mass||1500);
  const m2 = isPlayer ? (other.mass||1500) : CFG.mass;
  const relV = isPlayer ? car.speed - other.speed : other.speed - car.speed;
  if(Math.abs(relV) > 2.5) {
    const imp = relV * 0.35;
    if(isPlayer) {
      car.speed -= imp * (m2/(m1+m2));
      other.speed += imp * (m1/(m1+m2));
    } else {
      car.speed += imp * (m2/(m1+m2));
      other.speed -= imp * (m1/(m1+m2));
    }
  }
  return true;
}

function addDamage(a) { if(gameOver) return; totalDamage=Utils.clamp(totalDamage+a,0,100); updateDamageUI(); }

car.checkCollision = function(tcArr) {
  if(gameOver) return;
  for(const tc of tcArr) {
    if(tc.isStopped) continue;
    const hit = resolveCollision(this, tc, true);
    if(hit) {
      const rel = Math.abs(this.speed - tc.speed);
      const force = Utils.clamp(rel * 0.2, 0, CFG.crashForceMax);
      const dir = new THREE.Vector3(this.x-tc.x, 0.4, this.z-tc.z).normalize();
      
      if(force < CFG.crashForceThreshold && Math.abs(rel)>3) this.applyCrash(force*0.5, dir, tc.group.position.clone(), true);
      else this.applyCrash(force, dir, tc.group.position.clone());
      
      world.addAccidentZone(tc.x, tc.z);
      if(navigator.vibrate) navigator.vibrate([25,10,25]);
    }
  }
  if(Math.abs(this.x)>CFG.roadRight-1.3 || Math.abs(this.x)<CFG.roadLeft+1.3) {
    if(Math.abs(this.speed)>4) {
      const side = this.x>0?1:-1;
      this.applyCrash(0.15, new THREE.Vector3(-side,0,0), new THREE.Vector3(this.x+side*0.8,0.3,this.z), true);
    }
  }
};

let lastTime = performance.now();
function animate(now) {
  requestAnimationFrame(animate);
  let dt = (now-lastTime)/1000; lastTime = now; dt = Math.min(dt,0.05);
  
  if(slowMoTimer>0){ slowMoTimer-=dt; slowMo=0.25+(1-slowMoTimer/1.0)*0.75; } else slowMo=1;
  const ds = dt * slowMo;
  
  updateWeather(ds);
  car.update(ds, Input);
  world.update();
  car.checkCollision(world.trafficCars);
  particlePool.updateAll(ds, (p,dt)=>p.update(dt));  
  const camOff = new THREE.Vector3(0, CFG.cameraHeight, CFG.cameraDistance);
  camOff.applyAxisAngle(new THREE.Vector3(0,1,0), car.angle);
  const tPos = car.group.position.clone().add(camOff);
  tPos.y += Math.abs(car.speed)*0.01;
  
  camera.position.x = Utils.lerp(camera.position.x, tPos.x, CFG.cameraFollowLerp);
  camera.position.y = Utils.lerp(camera.position.y, tPos.y, CFG.cameraFollowLerp);
  camera.position.z = Utils.lerp(camera.position.z, tPos.z, CFG.cameraFollowLerp);
  
  if(cameraShake>0){
    camera.position.x += Utils.rand(-1,1)*cameraShake*0.25;
    camera.position.y += Utils.rand(-1,1)*cameraShake*0.15;
    cameraShake *= 0.85;
  }
  camera.lookAt(car.group.position.clone().add(new THREE.Vector3(0,1.2,-CFG.cameraLookAhead)));
  
  sunT.position.set(car.x,0,car.z);
  sun.position.set(car.x+50,70,car.z+40);
  sky.position.copy(camera.position);
  
  document.getElementById('speedo').innerHTML = `${car.getSpeedKMH()} <span>KM/H</span>`;
  renderer.render(scene, camera);
}

// Скрываем загрузку сразу, как только скрипт загрузился
setTimeout(()=>{
  const ld = document.getElementById('loading');
  if(ld) ld.classList.add('hidden');
}, 1500);

updateDamageUI();
animate(performance.now());

window.addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
document.addEventListener('gesturestart', e=>e.preventDefault());
document.addEventListener('gesturechange', e=>e.preventDefault());
</script>
